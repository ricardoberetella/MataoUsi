<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro de Produtos — Lista Completa</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/produtos.css">

    <style>
        .linha-filtro {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        #campoBusca {
            padding: 10px;
            min-width: 260px;
            border-radius: 8px;
            border: 1px solid #38bdf8;
            background: #020617;
            color: white;
        }

        #tabelaResultados th,
        #tabelaResultados td {
            text-align: left;
        }

        /* Impressão corrigida */
        @media print {

            .topbar,
            .linha-filtro,
            .btn-primario {
                display: none !important;
            }

            #tabelaResultados {
                width: 95% !important;
                border-collapse: collapse !important;
                margin-left: 10px !important;
            }

            #tabelaResultados th {
                background: #e5e7eb !important;
                color: #000 !important;
                border: 1px solid #000 !important;
                padding: 6px !important;
            }

            #tabelaResultados td {
                border: 1px solid #000 !important;
                padding: 6px !important;
                color: #000 !important;
            }

        }

    </style>
</head>

<body>

<header class="topbar">
    <h1 class="topbar-title">Filtro de Produtos — Lista Completa</h1>

    <a href="produtos_filtros.html">
        <button class="btn-voltar">Voltar</button>
    </a>
</header>

<div class="container">

    <!-- Filtros -->
    <section class="card card-filtro">

        <h2 class="card-title">Listar / Filtrar Produtos</h2>

        <div class="linha-filtro">
            <label for="campoBusca">Buscar</label>
            <input id="campoBusca" placeholder="Código ou descrição...">

            <button id="btnBuscar" class="btn-primario">Buscar</button>
            <button id="btnImprimir" class="btn-primario">Imprimir</button>
        </div>

        <table id="tabelaResultados" class="tabela">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Descrição</th>
                    <th>Comp. (mm)</th>
                    <th>Peso Líq.</th>
                    <th>Peso Bruto</th>
                    <th>Valor Unit.</th>
                    <th>Acabamento</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </section>
</div>

<script type="module" src="js/produtos_filtro.js"></script>

</body>
</html>
