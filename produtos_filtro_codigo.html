<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro de Produtos — Lista Completa</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/produtos.css">

    <style>
        .card-filtro {
            max-width: 1100px;
            margin: 20px auto;
        }

        .linha-filtro {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
        }

        /* NOVO SELECT */
        #selectBusca {
            width: 350px;
            padding: 10px;
            background: #020617;
            color: #e2e8f0;
            border: 1px solid #38bdf8;
            border-radius: 6px;
            font-size: 15px;
        }

        #selectBusca option {
            background: #020617;
            color: #fff;
        }

        #btnImprimir {
            background: #22c55e !important;
            color: #000 !important;
            font-weight: bold;
        }

        /* Cabeçalho impressão escondido */
        .print-header,
        .print-info {
            display: none;
        }

        @media print {

            * {
                background: #fff !important;
                color: #000 !important;
            }

            .topbar,
            .linha-filtro,
            .btn-primario,
            h2.card-title {
                display: none !important;
            }

            .container,
            .card {
                background: transparent !important;
                border: none !important;
                padding: 0 !important;
            }

            .print-header {
                display: flex !important;
                align-items: center;
                gap: 15px;
                margin: 10px;
            }

            .logo-print {
                width: 60px !important;
            }

            .titulo-print {
                font-size: 22px !important;
                font-weight: bold !important;
            }

            .print-info {
                display: block !important;
                margin-left: 10px;
                margin-bottom: 10px;
            }

            #tabelaResultados {
                width: 95% !important;
                margin-left: 10px !important;
                border-collapse: collapse !important;
            }

            #tabelaResultados th,
            #tabelaResultados td {
                border: 1px solid #000 !important;
                padding: 6px !important;
            }

            #tabelaResultados th {
                background: #f1f1f1 !important;
                font-weight: bold !important;
            }
        }
    </style>
</head>

<body>

<header class="topbar">
    <h1 class="topbar-title">Filtro de Produtos — Lista Completa</h1>

    <a href="produtos_filtros.html">
        <button class="btn-voltar">Voltar</button>
    </a>
</header>

<div class="container">

    <!-- Cabeçalho impressão -->
    <div class="print-header">
        <img src="img/logo-mataousi2.png" class="logo-print">
        <span class="titulo-print">MATÃO USINAGEM</span>
    </div>

    <div class="print-info">
        Relatório gerado em: <span id="dataGeradaPrint"></span>
    </div>

    <section class="card card-filtro">

        <h2 class="card-title">Listar / Filtrar Produtos</h2>

        <div class="linha-filtro">
            <label for="selectBusca">Buscar</label>

            <!-- NOVO SELECT (SEM DATALIST) -->
            <select id="selectBusca">
                <option value="">Carregando...</option>
            </select>

            <button id="btnBuscar" class="btn-primario">Buscar</button>
            <button id="btnImprimir" class="btn-primario">Imprimir</button>
        </div>

        <table id="tabelaResultados" class="tabela">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Descrição</th>
                    <th>Comp. (mm)</th>
                    <th>Peso Líq.</th>
                    <th>Peso Bruto</th>
                    <th>Valor Unit.</th>
                    <th>Acabamento</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </section>
</div>

<script type="module" src="js/produtos_filtro.js"></script>

</body>

</html>
