<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Itens do Pedido - MataoUsi</title>

  <link rel="stylesheet" href="CSS/pedidos_itens.css" />
</head>

<body>
  <header class="topbar">
    <div class="user-area">
      <div class="logo-circle">MU</div>
      <div class="logo-text">
        <span class="app-name">Matao Usinagem</span>
        <span class="app-subtitle">Itens do Pedido</span>
      </div>
    </div>

    <button class="btn btn-ghost" onclick="window.location.href='pedidos_lista.html'">
      Voltar aos Pedidos
    </button>
  </header>

  <main class="page">
    <section class="card">

      <div class="card-header">
        <div>
          <h1>Itens do Pedido</h1>
          <p class="texto-menor" id="infoPedido"></p>
        </div>
      </div>

      <div class="table-wrapper">
        <table class="tabela">
          <thead>
            <tr>
              <th>CÓDIGO</th>
              <th>DESCRIÇÃO</th>
              <th>QTD SOL.</th>
              <th>QTD ENTREGUE</th>
              <th>RESTANTE</th>
              <th>UNIT</th>
              <th>TOTAL</th>
              <th>DATA ENTREGA</th>
              <th>STATUS</th>
            </tr>
          </thead>
          <tbody id="listaItens"></tbody>
        </table>
      </div>

      <p id="msgErro" class="msg-erro"></p>
    </section>
  </main>

  <!-- AGORA CORRETO -->
  <script type="module" src="js/pedido_itens.js"></script>
</body>
</html>
