<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Matão USI</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f1f3f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #ffffff;
      width: 100%;
      max-width: 380px;
      padding: 35px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
      color: #202124;
      font-size: 26px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #dadce0;
      font-size: 15px;
    }

    button {
      width: 100%;
      background: #1a73e8;
      padding: 14px;
      border: none;
      margin-top: 10px;
      color: white;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(26,115,232,0.3);
      transition: 0.2s;
    }

    button:hover {
      background: #1663c4;
      box-shadow: 0 3px 8px rgba(26,115,232,0.5);
    }

    .msg {
      margin-top: 15px;
      font-size: 13px;
      color: #d93025;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Login</h1>

    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="entrar()">Entrar</button>

    <div class="msg" id="msg"></div>
  </div>

  <script src="supabaseClient.js"></script>
  <script src="login.js"></script>

</body>
</html>
