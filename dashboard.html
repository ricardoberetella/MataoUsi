<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - MataoUsi</title>

  <link rel="stylesheet" href="css/dashboard.css">

  <style>
    /* LOGO GRANDE COLADO NO TOPO */
    .logo-dashboard {
      width: 320px;
      display: block;
      margin: 0 auto 5px auto; /* encostar no topo */
    }

    /* SUBIR TUDO PARA O TOPO */
    body {
      padding-top: 0 !important;
    }

    .sidebar {
      padding-top: 0 !important;
    }

    .main {
      padding-top: 0 !important;
    }

    /* Ajustar o título do menu lateral */
    .logo-sistema {
      font-size: 22px;
      font-weight: bold;
      color: #38bdf8;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      margin-top: 5px; /* grudadinho no topo */
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- LOGO GRANDE NO TOPO -->
  <img src="img/logo-mataousi.png" class="logo-dashboard">

  <div class="layout">

    <!-- MENU LATERAL -->
    <aside class="sidebar">

      <!-- ALTERADO: agora aparece MATÃO USINAGEM -->
      <div class="logo-sistema">MATÃO USINAGEM</div>

      <nav class="menu">
        <div class="menu-titulo">Módulos</div>

        <a href="clientes.html" class="menu-item">👤 Clientes</a>
        <a href="pedidos_lista.html" class="menu-item">📑 Pedidos</a>
        <a href="produtos.html" class="menu-item">📦 Produtos</a>
        <a href="estoque.html" class="menu-item">📊 Estoque</a>
        <a href="movimentacoes.html" class="menu-item">🔄 Movimentações</a>
      </nav>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main">

      <section class="topo-dashboard">
        <h1 class="titulo-principal">Painel Principal</h1>
        <p class="subtitulo">Selecione um módulo no menu ao lado.</p>
      </section>

      <section class="secao-painel">
        <div class="cards-grid">

          <a class="card" href="clientes.html">
            <div class="card-titulo">Clientes</div>
            <div class="card-legenda">Gerenciar cadastro</div>
          </a>

          <a class="card" href="pedidos_lista.html">
            <div class="card-titulo">Pedidos</div>
            <div class="card-legenda">Lista de pedidos</div>
          </a>

          <a class="card" href="produtos.html">
            <div class="card-titulo">Produtos</div>
            <div class="card-legenda">Cadastro de peças</div>
          </a>

          <a class="card" href="estoque.html">
            <div class="card-titulo">Estoque</div>
            <div class="card-legenda">Controle de entradas/saídas</div>
          </a>

        </div>
      </section>

    </main>

  </div>

</body>
</html>
