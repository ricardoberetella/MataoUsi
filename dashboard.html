<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - MataoUsi</title>

  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

  <!-- LOGO FIXO NO TOPO -->
  <img src="img/logo-mataousi.png" class="logo-dashboard">

  <div class="layout">

    <!-- MENU LATERAL -->
    <aside class="sidebar">
      <div class="logo-sistema">MATÃO USINAGEM</div>

      <nav class="menu">
        <div class="menu-titulo">Módulos</div>

        <a href="clientes.html" class="menu-item">👤 Clientes</a>
        <a href="pedidos_lista.html" class="menu-item">📑 Pedidos</a>
        <a href="produtos_lista.html" class="menu-item">📦 Produtos</a>
        <a href="estoque.html" class="menu-item">📊 Estoque</a>
        <a href="movimentacoes.html" class="menu-item">🔄 Movimentações</a>
      </nav>

      <!-- BOTÃO SAIR -->
      <button id="btnLogout" class="menu-item botao-sair">
        🚪 Sair
      </button>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main">

      <section class="secao-painel">

        <div class="cards-grid">
          
          <a class="card" href="clientes.html">
            <div class="card-titulo">Clientes</div>
            <div class="card-legenda">Gerenciar cadastro</div>
          </a>

          <a class="card" href="pedidos_lista.html">
            <div class="card-titulo">Pedidos</div>
            <div class="card-legenda">Lista de pedidos</div>
          </a>

          <a class="card" href="produtos_lista.html">
            <div class="card-titulo">Produtos</div>
            <div class="card-legenda">Cadastro de peças</div>
          </a>

          <a class="card" href="estoque.html">
            <div class="card-titulo">Estoque</div>
            <div class="card-legenda">Controle de entradas/saídas</div>
          </a>

        </div>

      </section>

    </main>

  </div>

  <!-- SCRIPT SUPABASE + SESSÃO + LOGOUT -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://uxtgicfuggpuyjybwawa.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4dGdpY2Z1Z2dwdXlqeWJ3YXdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyNjIyNjIsImV4cCI6MjA3ODgzODI2Mn0.bYAyuTccwk21yWiYrFt_v6mWubDWJGVRWT0rJT74fGg";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // PROTEGER A PÁGINA – NÃO PERMITIR ACESSO SEM LOGIN
    async function verificarSessao() {
      const { data } = await supabase.auth.getUser();

      if (!data.user) {
        // Não está logado → voltar ao login
        window.location.href = "index.html";
        return;
      }

      console.log("Usuário logado:", data.user.email);
    }

    verificarSessao();

    // BOTÃO SAIR
    document.getElementById("btnLogout").addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.href = "index.html";
    });
  </script>

</body>
</html>
