<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Matão Usinagem</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
      <div class="logo-sistema">Matão Usinagem</div>

      <nav class="menu">
        <a href="clientes.html" class="menu-item">👤 Clientes</a>
        <a href="pedidos.html" class="menu-item">📄 Pedidos</a>
        <a href="produtos.html" class="menu-item">📦 Produtos</a>
        <a href="estoque.html" class="menu-item">🏭 Estoque</a>
        <a href="movimentacoes.html" class="menu-item">🔄 Movimentações</a>
        <a href="empresas.html" class="menu-item">🏢 Empresas</a>
      </nav>
  </aside>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="main">

    <!-- LOGO CENTRAL (AGORA MAIS PARA O TOPO) -->
    <section class="topo-dashboard">
      <img src="img/logo-mataousi.png" class="logo-dashboard" alt="Logo Matão Usinagem">
      <p class="subtitulo">Selecione um módulo no menu ao lado.</p>
    </section>

    <!-- CARDS (SEM IMAGENS QUEBRADAS) -->
    <section class="cards-grid">

      <a href="clientes.html" class="card">
        <span class="card-titulo">Clientes</span>
      </a>

      <a href="pedidos.html" class="card">
        <span class="card-titulo">Pedidos</span>
      </a>

      <a href="produtos.html" class="card">
        <span class="card-titulo">Produtos</span>
      </a>

      <a href="estoque.html" class="card">
        <span class="card-titulo">Estoque</span>
      </a>

      <a href="movimentacoes.html" class="card">
        <span class="card-titulo">Movimentações</span>
      </a>

      <a href="relatorios.html" class="card">
        <span class="card-titulo">Relatórios</span>
      </a>

    </section>

  </main>

</div>

</body>
</html>
