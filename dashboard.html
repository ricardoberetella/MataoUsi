<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - MataoUsi</title>

  <link rel="stylesheet" href="css/dashboard.css">

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./js/config.js";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      document.getElementById("logout").addEventListener("click", async () => {
        await supabase.auth.signOut();
        window.location.href = "index.html";
      });
    });
  </script>
</head>

<body>

  <!-- MENU LATERAL FUTURISTA -->
  <aside class="sidebar">
    <div class="logo">MataoUsi</div>

    <nav>
      <a href="dashboard.html" class="active">🏠 Dashboard</a>
      <a href="clientes.html">👤 Clientes</a>
      <a href="pedidos.html">🧾 Pedidos</a>
      <a href="produtos.html">📦 Produtos</a>
      <a href="estoque.html">🏢 Estoque</a>
      <a href="movimentacoes.html">🔄 Movimentações</a>
      <a href="empresas.html">🏭 Empresas</a>
      <a href="relatorios.html">📊 Relatórios</a>

      <button id="logout" class="logout">⏻ Sair</button>
    </nav>
  </aside>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="content">
    <h1>Bem-vindo ao Sistema</h1>
    <p>Selecione um módulo no menu ao lado.</p>

    <div class="cards">

      <div class="card" onclick="location.href='clientes.html'">
        <span>👤</span>
        Clientes
      </div>

      <div class="card" onclick="location.href='pedidos.html'">
        <span>🧾</span>
        Pedidos
      </div>

      <div class="card" onclick="location.href='produtos.html'">
        <span>📦</span>
        Produtos
      </div>

      <div class="card" onclick="location.href='estoque.html'">
        <span>🏢</span>
        Estoque
      </div>

      <div class="card" onclick="location.href='movimentacoes.html'">
        <span>🔄</span>
        Movimentações
      </div>

      <div class="card" onclick="location.href='relatorios.html'">
        <span>📊</span>
        Relatórios
      </div>

    </div>
  </main>

</body>

</html>
