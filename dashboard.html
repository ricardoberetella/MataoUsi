<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini ERP - Dashboard</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background-color: #f3f4f6; color: #111827; }
    .app { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: 230px; background: #111827; color: #f9fafb;
      padding: 20px 15px; display: flex; flex-direction: column;
    }
    .logo { font-size: 20px; font-weight: bold; margin-bottom: 20px; text-align: center; }
    .sidebar small { color: #9ca3af; text-align: center; display: block; margin-bottom: 20px; }

    .menu { display: flex; flex-direction: column; gap: 8px; }
    .menu button {
      background: transparent; border: none; color: #e5e7eb; text-align: left;
      padding: 8px 10px; cursor: pointer; border-radius: 6px; font-size: 14px;
      transition: 0.2s;
    }
    .menu button:hover { background: #1f2937; transform: translateX(3px); }
    .menu button.active { background: #2563eb; color: #fff; }

    /* FOOTER */
    .sidebar-footer { margin-top: auto; text-align: center; color: #9ca3af; font-size: 12px; }

    /* CONTENT AREA */
    .content { flex: 1; padding: 20px; }
    .topbar { margin-bottom: 20px; }
    .topbar h1 { font-size: 22px; }
    .topbar span { font-size: 14px; color: #6b7280; }

    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.3s; }
