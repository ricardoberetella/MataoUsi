<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - MataoUsi</title>

  <!-- CSS externo -->
  <link rel="stylesheet" href="css/dashboard.css">

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./js/config.js";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 🔒 IMPEDIR ACESSO SEM LOGIN
    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { user } } = await supabase.auth.getUser();

      if (!user) {
        window.location.href = "index.html";
        return;
      }

      // Botão de sair
      const logoutBtn = document.getElementById("logout");
      logoutBtn.addEventListener("click", async () => {
        await supabase.auth.signOut();
        window.location.href = "index.html";
      });
    });
  </script>
</head>

<body>

  <div class="navbar">
    <div class="logo">MataoUsi - Dashboard</div>
    <button id="logout" class="logoutBtn">Sair</button>
  </div>

  <div class="content">
    <h1>Bem-vindo ao Sistema</h1>
    <p>Escolha um módulo abaixo:</p>

    <div class="modules">

      <!-- NOVOS MÓDULOS -->
      <div class="box" onclick="location.href='clientes.html'">Clientes</div>
      <div class="box" onclick="location.href='pedidos.html'">Pedidos</div>

      <!-- MÓDULOS EXISTENTES -->
      <div class="box" onclick="location.href='empresas.html'">Empresas</div>
      <div class="box" onclick="location.href='produtos.html'">Produtos</div>
      <div class="box" onclick="location.href='estoque.html'">Estoque</div>
      <div class="box" onclick="location.href='movimentacoes.html'">Movimentações</div>
      <div class="box" onclick="location.href='relatorios.html'">Relatórios</div>

    </div>
  </div>

</body>
</html>
