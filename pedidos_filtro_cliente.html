<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro por Cliente</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pedidos.css">
</head>

<body>

<header class="topbar">
    <h1>Filtro por Cliente</h1>

    <a href="pedidos_filtros.html">
        <button class="btn-voltar">Voltar</button>
    </a>
</header>

<div class="container">

    <section class="card">
        <h2>Selecione o Cliente</h2>

        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:15px;">

            <select id="clienteSelect" style="
                min-width:260px; 
                padding:10px; 
                border-radius:10px; 
                border:1px solid rgba(56,189,248,0.35);
                background:#020617; 
                color:#e2e8f0;">
                <option value="">Selecione...</option>
            </select>

            <button id="btnBuscar" class="btn-primary" type="button">
                Buscar
            </button>

            <!-- BOTÃO IMPRIMIR ALTERADO PARA FICAR IGUAL AO DO FILTRO POR PRODUTO -->
            <button id="btnImprimir" 
                type="button"
                style="
                    background:#22c55e;
                    color:#000;
                    padding:10px 22px;
                    border:none;
                    border-radius:10px;
                    cursor:pointer;
                    font-weight:600;
                    font-size:16px;
                ">
                Imprimir
            </button>

        </div>

        <div class="tabela-wrapper">
            <table class="tabela-lista" id="tabelaCliente">
                <thead>
                    <tr>
                        <th>Pedido</th>
                        <th>Entrega</th>
                        <th>Código</th>
                        <th>Quantidade</th>
                    </tr>
                </thead>

                <tbody id="tbodyResultados">
                    <tr><td colspan="4">Selecione um cliente e clique em Buscar.</td></tr>
                </tbody>

                <tfoot>
                    <tr>
                        <th colspan="3" style="text-align:right;">TOTAL:</th>
                        <th id="totalQuantidade">0</th>
                    </tr>
                </tfoot>

            </table>
        </div>
    </section>

</div>

<script type="module" src="js/pedidos_filtro_cliente.js"></script>

</body>
</html>
