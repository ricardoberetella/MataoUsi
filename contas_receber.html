<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contas a Receber</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pedidos_lista.css">

    <!-- LIB PDF (PADRÃO DO SISTEMA) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* ===== ITENS SOMENTE PARA PDF ===== */
        .logo-print,
        .cabecalho-print {
            display: none;
        }

        body.modo-pdf .logo-print,
        body.modo-pdf .cabecalho-print {
            display: block;
        }

        body.modo-pdf header,
        body.modo-pdf .card:first-child,
        body.modo-pdf button {
            display: none !important;
        }

        body.modo-pdf {
            background: #fff !important;
            color: #000 !important;
        }

        body.modo-pdf table {
            color: #000 !important;
        }

        body.modo-pdf tr.vencido {
            background: #f8d7da !important;
        }
    </style>
</head>

<body>

<header class="topbar">
    <a href="dashboard.html">
        <button class="btn-voltar">⬅ Voltar</button>
    </a>
    <h1 class="topbar-title">Contas a Receber</h1>
</header>

<div class="container" id="areaPdf">

    <!-- CABEÇALHO PDF -->
    <div class="cabecalho-print">
        <h2>MATÃO USINAGEM</h2>
        <p>Relatório de Contas a Receber</p>
        <p>Gerado em: <span id="dataHoraPdf"></span></p>
        <hr>
    </div>

    <!-- FILTROS -->
    <section class="card">
        <h2 class="card-title">Filtros</h2>

        <div class="form-grid">
            <div class="form-group">
                <label>Status</label>
                <select id="filtroStatus">
                    <option value="">Todos</option>
                    <option value="ABERTO">Em aberto</option>
                    <option value="VENCIDO">Vencido</option>
                    <option value="PAGO">Pago</option>
                </select>
            </div>

            <div class="form-group">
                <label>Vencimento até</label>
                <input type="date" id="filtroVencimento">
            </div>
        </div>

        <button id="btnFiltrar" class="btn-azul">Filtrar</button>
        <button id="btnNovoManual" class="btn-verde">+ Lançamento Manual</button>
        <button id="btnGerarPdf" class="btn-azul">Gerar PDF</button>
    </section>

    <!-- TABELA -->
    <section class="card">
        <h2 class="card-title">Lançamentos</h2>

        <table>
            <thead>
                <tr>
                    <th>NF / Origem</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Status</th>
                    <th class="acao-coluna">Ações</th>
                </tr>
            </thead>
            <tbody id="listaReceber"></tbody>
        </table>

        <div style="margin-top:10px; font-weight:bold">
            Total filtrado: <span id="totalReceber">R$ 0,00</span>
        </div>
    </section>

</div>

<script type="module" src="js/contas_receber.js"></script>
</body>
</html>
