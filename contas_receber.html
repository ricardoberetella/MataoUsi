<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contas a Receber - Mini ERP</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f1f5f9; color: #0f172a; }
    input, select, button { padding: 8px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
    button { background: #3b82f6; color: #fff; border: none; cursor: pointer; }
    button:hover { background: #2563eb; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #e2e8f0; }
    a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <h1>Contas a Receber</h1>
  <a href="dashboard.html">← Voltar ao Dashboard</a>

  <h3>Nova Conta a Receber</h3>
  <label>Cliente:</label>
  <select id="cliente"></select><br>
  <label>Descrição:</label>
  <input type="text" id="descricao" placeholder="Descrição"><br>
  <label>Valor:</label>
  <input type="number" id="valor" min="0" step="0.01"><br>
  <label>Data de Vencimento:</label>
  <input type="date" id="vencimento"><br>
  <button id="btnCadastrar">Cadastrar</button>

  <h3>Lista de Contas a Receber</h3>
  <table id="tabelaReceber">
    <thead>
      <tr>
        <th>Cliente</th>
        <th>Descrição</th>
        <th>Valor</th>
        <th>Vencimento</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script type="module" src="./contas_receber.js"></script>
</body>
</html>
