<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contas a Receber</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pedidos_lista.css">

    <!-- LIB PDF (igual outras telas) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* fonte um pouco maior na tabela */
        table th, table td {
            font-size: 15px;
        }

        /* linha vencida */
        tr.vencido td {
            background: rgba(180, 0, 0, 0.22) !important;
            color: #fff !important;
        }

        /* modal centralizado e sempre dentro da tela (sem precisar zoom) */
        #modalManual.modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: rgba(0,0,0,0.55);
            z-index: 9999;
        }
        #modalManual .modal-conteudo {
            width: min(520px, 96vw);
            max-height: 90vh;
            overflow: auto;
        }

        /* quando gerar PDF, escondemos botões e filtros */
        body.modo-pdf header,
        body.modo-pdf .card:first-child,
        body.modo-pdf button {
            display: none !important;
        }
        body.modo-pdf .container {
            width: 100% !important;
        }
    </style>
</head>

<body>

<header class="topbar">
    <a href="dashboard.html">
        <button class="btn-voltar">⬅ Voltar</button>
    </a>
    <h1 class="topbar-title">Contas a Receber</h1>
</header>

<div class="container" id="areaPdf">

    <!-- FILTROS -->
    <section class="card">
        <h2 class="card-title">Filtros</h2>

        <div class="form-grid">
            <div class="form-group">
                <label>Status</label>
                <select id="filtroStatus">
                    <option value="">Todos</option>
                    <option value="ABERTO">Em aberto</option>
                    <option value="VENCIDO">Vencido</option>
                    <option value="PAGO">Pago</option>
                </select>
            </div>

            <div class="form-group">
                <label>Vencimento até</label>
                <input type="date" id="filtroVencimento">
            </div>
        </div>

        <div style="display:flex; gap:10px; flex-wrap:wrap">
            <button id="btnFiltrar" class="btn-azul">Filtrar</button>
            <button id="btnNovoManual" class="btn-verde">+ Lançamento Manual</button>
            <button id="btnGerarPDF" class="btn-azul">Gerar PDF</button>
        </div>
    </section>

    <!-- TABELA -->
    <section class="card">
        <h2 class="card-title">Lançamentos</h2>

        <table>
            <thead>
                <tr>
                    <th>NF / Origem</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaReceber"></tbody>
        </table>

        <div style="margin-top:10px; font-weight:bold">
            Total filtrado: <span id="totalReceber">R$ 0,00</span>
        </div>
    </section>

</div>

<!-- MODAL LANÇAMENTO MANUAL -->
<div id="modalManual" class="modal">
    <div class="modal-conteudo">
        <h3>Novo Lançamento Manual</h3>

        <label>Origem (NF antiga, código, etc)</label>
        <input type="text" id="origemManual">

        <label>Valor</label>
        <input type="number" id="valorManual" step="0.01">

        <label>Vencimento</label>
        <input type="date" id="vencimentoManual">

        <div class="modal-acoes">
            <button id="btnSalvarManual" class="btn-verde">Salvar</button>
            <button id="btnCancelarManual" class="btn-vermelho">Cancelar</button>
        </div>
    </div>
</div>

<script type="module" src="js/contas_receber.js"></script>
</body>
</html>
