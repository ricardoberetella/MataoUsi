<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contas a Receber</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pedidos_lista.css">

    <style>
        /* ===== Alinhamento perfeito com cabeçalho ===== */
        .tabela-centralizada table th,
        .tabela-centralizada table td{
            text-align: center !important;
            vertical-align: middle !important;
        }

        /* ===== Modal (mesmo estilo do seu) ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-box {
            background: #0b1220;
            padding: 20px;
            border-radius: 10px;
            width: 380px;
            border: 1px solid #38bdf8;
        }
        .modal-box h3 {
            margin-top: 0;
            color: #38bdf8;
        }
        .modal-box label {
            display: block;
            margin-top: 10px;
            margin-bottom: 6px;
        }
        .modal-box input, .modal-box select {
            width: 100%;
            margin-bottom: 6px;
            padding: 8px;
            background: #020617;
            border: 1px solid #1e293b;
            color: #e5e7eb;
            border-radius: 8px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 14px;
        }

        /* ===== Botões lado a lado ===== */
        .acoes-filtros {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<header class="topbar">
    <a href="dashboard.html">
        <button class="btn-voltar">⬅ Voltar</button>
    </a>
    <h1 class="topbar-title">Contas a Receber</h1>
</header>

<div class="container">

    <!-- FILTROS -->
    <section class="card">
        <h2 class="card-title">Filtros</h2>

        <div class="form-grid">
            <div class="form-group">
                <label>Status</label>
                <select id="filtroStatus">
                    <option value="">Todos</option>
                    <option value="ABERTO">Em aberto</option>
                    <option value="VENCIDO">Vencido</option>
                    <option value="PAGO">Pago</option>
                </select>
            </div>

            <div class="form-group">
                <label>Vencimento até</label>
                <input type="date" id="filtroVencimento">
            </div>
        </div>

        <div class="acoes-filtros">
            <button id="btnFiltrar" class="btn-azul">Filtrar</button>
            <button id="btnNovoManual" class="btn-verde">+ Lançamento Manual</button>
        </div>
    </section>

    <!-- TABELA -->
    <section class="card tabela-centralizada">
        <h2 class="card-title">Lançamentos</h2>

        <table>
            <thead>
                <tr>
                    <th>NF</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaReceber"></tbody>
        </table>

        <div style="margin-top:10px; font-weight:bold">
            Total filtrado: <span id="totalReceber">R$ 0,00</span>
        </div>
    </section>

</div>

<!-- ===== MODAL LANÇAMENTO MANUAL ===== -->
<div class="modal" id="modalManual">
    <div class="modal-box">
        <h3>Lançamento Manual</h3>

        <label>Número da NF (antiga)</label>
        <input id="manualNumeroNF" type="text" placeholder="Ex: 6230">

        <label>Valor</label>
        <input id="manualValor" type="number" step="0.01" placeholder="Ex: 15988.00">

        <label>Vencimento</label>
        <input id="manualVencimento" type="date">

        <div class="modal-actions">
            <button id="btnCancelarManual" class="btn-cinza">Cancelar</button>
            <button id="btnSalvarManual" class="btn-azul">Salvar</button>
        </div>
    </div>
</div>

<script type="module" src="js/contas_receber.js"></script>
</body>
</html>
