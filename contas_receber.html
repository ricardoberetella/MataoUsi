<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contas a Receber</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pedidos_lista.css">
</head>

<body>

<header class="topbar">
    <a href="dashboard.html">
        <button class="btn-voltar">⬅ Voltar</button>
    </a>
    <h1 class="topbar-title">Contas a Receber</h1>
</header>

<div class="container">

    <!-- FILTROS -->
    <section class="card">
        <h2 class="card-title">Filtros</h2>

        <div class="form-grid">
            <div class="form-group">
                <label>Status</label>
                <select id="filtroStatus">
                    <option value="">Todos</option>
                    <option value="ABERTO">Em aberto</option>
                    <option value="VENCIDO">Vencido</option>
                    <option value="PAGO">Pago</option>
                </select>
            </div>

            <div class="form-group">
                <label>Vencimento até</label>
                <input type="date" id="filtroVencimento">
            </div>
        </div>

        <button id="btnFiltrar" class="btn-azul">Filtrar</button>

        <!-- BOTÃO MANUAL (ADMIN) -->
        <button id="btnNovoManual" class="btn-verde" style="margin-left:10px">
            + Lançamento Manual
        </button>
    </section>

    <!-- TABELA -->
    <section class="card">
        <h2 class="card-title">Lançamentos</h2>

        <table>
            <thead>
                <tr>
                    <th>NF</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaReceber"></tbody>
        </table>

        <div style="margin-top:10px; font-weight:bold">
            Total filtrado: <span id="totalReceber">R$ 0,00</span>
        </div>
    </section>
</div>

<!-- MODAL LANÇAMENTO MANUAL -->
<div id="modalManual" class="modal" style="display:none">
    <div class="modal-content">
        <h3>Lançamento Manual</h3>

        <label>NF (antiga)</label>
        <input type="text" id="manualNF" placeholder="Ex: 8890">

        <label>Descrição</label>
        <input type="text" id="manualDescricao" placeholder="Opcional">

        <label>Valor</label>
        <input type="number" id="manualValor" step="0.01">

        <label>Vencimento</label>
        <input type="date" id="manualVencimento">

        <div style="margin-top:15px; text-align:right">
            <button id="btnCancelarManual" class="btn-vermelho">Cancelar</button>
            <button id="btnSalvarManual" class="btn-verde">Salvar</button>
        </div>
    </div>
</div>

<script type="module" src="js/contas_receber.js"></script>
</body>
</html>
