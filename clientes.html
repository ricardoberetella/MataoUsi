<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - MataoUsi</title>

  <link rel="stylesheet" href="css/clientes.css">
</head>

<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <button class="btn-voltar" onclick="window.location.href='dashboard.html'">⬅ Voltar</button>
    <h1>Clientes</h1>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="cadastro">Cadastrar</div>
    <div class="tab" data-tab="lista">Lista de Clientes</div>
  </div>

  <!-- ABA DE CADASTRO -->
  <section id="cadastro" class="tab-content active">
    <form id="formCliente">

      <input type="hidden" id="clienteId">

      <label>Nome</label>
      <input type="text" id="nome" required>

      <label>CPF/CNPJ</label>
      <input type="text" id="cpf_cnpj">

      <label>Telefone</label>
      <input type="text" id="telefone">

      <label>E-mail</label>
      <input type="email" id="email">

      <label>Endereço</label>
      <input type="text" id="endereco">

      <div class="actions">
        <button type="submit" class="btn-salvar">Salvar</button>
        <button type="button" id="btnCancelar" class="btn-cancelar">Cancelar</button>
      </div>

    </form>
  </section>

  <!-- ABA LISTA -->
  <section id="lista" class="tab-content">
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>CPF/CNPJ</th>
          <th>Telefone</th>
          <th>Email</th>
          <th>Endereço</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="tabelaClientes">
        <!-- JS insere aqui -->
      </tbody>
    </table>
  </section>

  <script type="module" src="js/clientes.js"></script>
</body>

</html>
