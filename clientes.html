<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Clientes</title>

  <link rel="stylesheet" href="css/clientes.css">
</head>

<body>

  <header class="topbar">
    <h1>Clientes</h1>
    <button onclick="window.location.href='dashboard.html'" class="btnVoltar">Voltar</button>
  </header>

  <div class="container">

    <form id="formCliente">

      <h2>Cadastrar / Editar Cliente</h2>

      <label>Razão Social</label>
      <input type="text" id="razao_social" required>

      <label>CPF/CNPJ</label>
      <!-- MÁSCARA APLICADA AQUI -->
      <input type="text" id="cpf_cnpj" placeholder="CPF ou CNPJ" oninput="mascararCpfCnpj(this)" required>

      <label>Telefone</label>
      <input type="text" id="telefone">

      <label>Email</label>
      <input type="email" id="email">

      <label>Endereço</label>
      <input type="text" id="endereco">

      <button type="submit" class="btnSalvar">Salvar</button>
      <button type="button" id="btnCancelar" class="btnCancelar">Cancelar</button>
    </form>

    <hr>

    <h2>Lista de Clientes</h2>
    <button onclick="carregarClientes()" class="btnListar">Listar Todos</button>

    <table id="tabelaClientes">
      <thead>
        <tr>
          <th>Razão Social</th>
          <th>CPF/CNPJ</th>
          <th>Telefone</th>
          <th>Email</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

  <script type="module" src="js/clientes.js"></script>

</body>
</html>
