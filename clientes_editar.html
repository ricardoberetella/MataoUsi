<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar Cliente - Matão Usinagem</title>
  <link rel="stylesheet" href="css/clientes.css">
  <script type="module" src="js/clientes_editar.js"></script>
</head>

<body>

<main class="main-full">

  <h1 class="titulo">Editar Cliente</h1>

  <form id="formEditar" class="form-box">

    <label>Razão Social</label>
    <input type="text" id="razao" required>

    <label>CNPJ</label>
    <input type="text" id="cnpj" required>

    <label>Telefone</label>
    <input type="text" id="telefone">

    <label>E-mail</label>
    <input type="email" id="email">

    <label>Endereço</label>
    <input type="text" id="endereco">

    <button class="btn-neon salvar-btn" type="submit">Salvar Alterações</button>
  </form>

  <a href="clientes.html" class="btn-voltar">⟵ Voltar</a>

</main>

</body>
</html>
