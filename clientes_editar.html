<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Cliente</title>
    <link rel="stylesheet" href="css/clientes.css">
</head>

<body>

    <h1 class="titulo">Editar Cliente</h1>

    <form id="formEditar" class="formulario">
        <input type="hidden" id="id">

        <label>Razão Social</label>
        <input type="text" id="razao_social">

        <label>CNPJ</label>
        <input type="text" id="cpf_cnpj">

        <label>Telefone</label>
        <input type="text" id="telefone">

        <label>Email</label>
        <input type="email" id="email">

        <label>Endereço</label>
        <textarea id="endereco"></textarea>

        <button class="btn-primary" type="submit">Salvar Alterações</button>
        <button class="btn-secondary" type="button" onclick="window.location.href='clientes.html'">Cancelar</button>
    </form>

    <script type="module" src="js/clientes_editar.js"></script>
</body>
</html>
