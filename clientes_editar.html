<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Editar Cliente</title>
  <link rel="stylesheet" href="css/clientes.css">
  <style>
    .page-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #0b1120, #020617 60%);
    }

    .card {
      background: #020617;
      border-radius: 20px;
      padding: 30px 28px;
      box-shadow: 0 0 25px rgba(0, 234, 255, 0.15);
      border: 1px solid rgba(0, 234, 255, 0.25);
      width: 100%;
      max-width: 550px;
    }

    .card h1 {
      margin: 0 0 20px 0;
      font-size: 26px;
      color: #00eaff;
      text-shadow: 0 0 8px rgba(0, 234, 255, 0.6);
      text-align: center;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-group label {
      font-size: 13px;
      color: #9ca3af;
    }

    .form-group input {
      background: #020617;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      color: #e5e7eb;
      outline: none;
      transition: 0.25s;
    }

    .form-group input:focus {
      border-color: #00eaff;
      box-shadow: 0 0 10px rgba(0, 234, 255, 0.35);
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 22px;
    }

    .btn-salvar {
      flex: 1;
      background: #00eaff;
      border: none;
      border-radius: 999px;
      padding: 11px 14px;
      font-size: 15px;
      font-weight: bold;
      color: #020617;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      box-shadow: 0 0 15px rgba(0, 234, 255, 0.6);
      transition: 0.25s;
    }

    .btn-salvar:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 22px rgba(0, 234, 255, 0.9);
    }

    .btn-cancelar {
      flex: 1;
      background: #020617;
      border-radius: 999px;
      border: 1px solid #4b5563;
      padding: 11px 14px;
      font-size: 15px;
      font-weight: bold;
      color: #e5e7eb;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: 0.25s;
    }

    .btn-cancelar:hover {
      border-color: #00eaff;
      color: #00eaff;
      box-shadow: 0 0 15px rgba(0, 234, 255, 0.5);
    }

    .msg {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }

    .msg-error {
      color: #f97373;
    }

    .msg-success {
      color: #4ade80;
    }
  </style>
</head>

<body>
  <div class="page-wrapper">
    <div class="card">
      <h1>Editar Cliente</h1>

      <form id="formCliente">
        <div class="form-grid">
          <div class="form-group">
            <label for="razao_social">Razão Social *</label>
            <input type="text" id="razao_social" required autocomplete="off">
          </div>

          <div class="form-group">
            <label for="cnpj">CNPJ *</label>
            <input type="text" id="cnpj" required autocomplete="off" placeholder="Somente números">
          </div>

          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" autocomplete="off">
          </div>

          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" autocomplete="off">
          </div>

          <div class="form-group">
            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" autocomplete="off">
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn-salvar">Salvar</button>
          <button type="button" class="btn-cancelar" id="btnCancelar">Cancelar</button>
        </div>

        <div id="msg" class="msg"></div>
      </form>
    </div>
  </div>

  <script type="module" src="js/clientes_editar.js"></script>
</body>

</html>
