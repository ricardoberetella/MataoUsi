<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/clientes.css">
</head>
<body>

<header class="topbar">
    <h1 class="topbar-title">Editar Cliente</h1>

    <a href="clientes.html">
        <button class="btn-voltar-menu">← Voltar</button>
    </a>
</header>

<div class="container">

    <section class="card">
        <h2 class="card-title">Dados do Cliente</h2>

        <label>Razão Social</label>
        <input type="text" id="razao_social">

        <label>CPF / CNPJ</label>
        <input type="text" id="cpf_cnpj" oninput="mascaraCpfCnpj(this)">

        <label>Telefone</label>
        <input type="text" id="telefone" oninput="mascaraTelefone(this)">

        <label>E-mail</label>
        <input type="email" id="email">

        <label>Endereço</label>
        <input type="text" id="endereco">

        <br><br>

        <button class="btn-primario" id="btnSalvarEdicao">Salvar Alterações</button>
    </section>

</div>

<script type="module" src="js/clientes.js"></script>
<script src="js/mascaras.js"></script>

</body>
</html>
