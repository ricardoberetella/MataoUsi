<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Estoque - Matão USI</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f1f3f4;
    }

    header {
      background: #1a73e8;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: 600;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
      color: #202124;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #dadce0;
      font-size: 15px;
    }

    button {
      background: #1a73e8;
      border: none;
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: 0.25s;
    }

    button:hover {
      background: #1663c4;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 25px;
    }

    table th, table td {
      border: 1px solid #e0e0e0;
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }

    table th {
      background: #f8f9fa;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <header>Controle de Estoque - Matão USI</header>

  <div class="container">
    <h2>Cadastrar Produto</h2>

    <input type="text" id="nome" placeholder="Nome do Produto">
    <input type="text" id="sku" placeholder="SKU / Código Interno">
    <input type="text" id="unidade" placeholder="Unidade (ex: UN, KG)">
    <input type="number" id="quantidade" placeholder="Quantidade inicial">

    <button onclick="salvarProduto()">Salvar Produto</button>

    <h2>Lista de Produtos</h2>

    <table id="tabela">
      <thead>
        <tr>
          <th>SKU</th>
          <th>Nome</th>
          <th>Unidade</th>
          <th>Quantidade</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

  <script src="supabaseClient.js"></script>
  <script src="estoque.js"></script>

</body>
</html>
