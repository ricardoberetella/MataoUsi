<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Nota Fiscal</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pedidos_lista.css">
</head>

<body>

<header class="topbar">
    <a href="notas_lista.html">
        <button class="btn-voltar">⬅ Voltar</button>
    </a>
    <h1 class="topbar-title">Detalhes da Nota Fiscal</h1>
    <button class="btn-verde" onclick="window.print()">📄 Gerar PDF</button>
</header>

<div class="container">

    <section class="card">
        <h2 class="card-title">Informações da Nota Fiscal</h2>
        <p><strong>Número da NF:</strong> <span id="nfNumero"></span></p>
        <p><strong>Data:</strong> <span id="nfData"></span></p>
        <p><strong>Cliente:</strong> <span id="nfCliente"></span></p>
    </section>

    <section class="card">
        <h2 class="card-title">Itens da Nota Fiscal</h2>
        <table class="tabela">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Quantidade NF</th>
                </tr>
            </thead>
            <tbody id="listaItens"></tbody>
        </table>
    </section>

    <section class="card">
        <h2 class="card-title">Boletos da Nota Fiscal</h2>

        <table class="tabela">
            <thead>
                <tr>
                    <th>Origem</th>
                    <th>Tipo</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaBoletos">
                <tr>
                    <td colspan="5" style="text-align:center;">Carregando boletos...</td>
                </tr>
            </tbody>
        </table>
    </section>

</div>

<script type="module" src="js/notas_ver.js"></script>
</body>
</html>
