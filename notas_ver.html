<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Detalhes da Nota Fiscal</title>

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/pedidos_lista.css">

<style>
/* ================= MODAL BOLETO ================= */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.modal-box {
    background: #0b1220;
    border: 1px solid #38bdf8;
    border-radius: 10px;
    padding: 20px;
    width: 380px;
}

/* TOGGLE VISUAL */
.toggle-nf {
    display: flex;
    border: 1px solid #1e293b;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 12px;
}

.toggle-nf div {
    flex: 1;
    text-align: center;
    padding: 8px;
    cursor: pointer;
    background: #020617;
    color: #9ca3af;
    font-weight: 600;
}

.toggle-nf div.ativo {
    background: #38bdf8;
    color: #020617;
}

/* ESCONDER RADIOS ORIGINAIS */
.radio-hidden {
    display: none;
}

.modal-box label {
    font-size: 13px;
    margin-bottom: 4px;
    display: block;
}

.modal-box input {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    background: #020617;
    border: 1px solid #1e293b;
    color: #e5e7eb;
}

.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}
</style>
</head>

<body>

<header class="topbar">
    <button onclick="window.location.href='notas_lista.html'">⬅ Voltar</button>
    <h1>Detalhes da Nota Fiscal</h1>
</header>

<div class="container">

<section class="card">
    <h2>Boletos</h2>

    <button id="btnNovoBoleto" class="btn-verde">➕ Incluir Boleto</button>

    <table>
        <thead>
            <tr>
                <th>Vinculação</th>
                <th>Origem</th>
                <th>Valor</th>
                <th>Vencimento</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="listaBoletos"></tbody>
    </table>
</section>
</div>

<!-- MODAL BOLETO -->
<div class="modal" id="modalBoleto">
    <div class="modal-box">

        <!-- TOGGLE VISUAL -->
        <div class="toggle-nf">
            <div id="toggleComNF" class="ativo">Com NF</div>
            <div id="toggleSemNF">Sem NF</div>
        </div>

        <!-- RADIOS ORIGINAIS (MANTIDOS PARA O JS) -->
        <div class="radio-hidden">
            <label>
                <input type="radio" name="tipo_nf" value="NF" checked>
            </label>
            <label>
                <input type="radio" name="tipo_nf" value="SEM_NF">
            </label>
        </div>

        <label>Origem</label>
        <input id="boletoOrigem" type="text">

        <label>Valor</label>
        <input id="boletoValor" type="number" step="0.01">

        <label>Vencimento</label>
        <input id="boletoVencimento" type="date">

        <div class="modal-actions">
            <button id="btnCancelarBoleto" class="btn-cinza">Cancelar</button>
            <button id="btnSalvarBoleto" class="btn-azul">Salvar</button>
        </div>
    </div>
</div>

<script type="module">
/* ===============================
   TOGGLE VISUAL → RADIO REAL
   (NÃO MEXE NO JS PRINCIPAL)
================================ */
const toggleComNF = document.getElementById("toggleComNF");
const toggleSemNF = document.getElementById("toggleSemNF");

const radioNF = document.querySelector("input[name='tipo_nf'][value='NF']");
const radioSemNF = document.querySelector("input[name='tipo_nf'][value='SEM_NF']");

function selecionar(tipo) {
    if (tipo === "NF") {
        radioNF.checked = true;
        toggleComNF.classList.add("ativo");
        toggleSemNF.classList.remove("ativo");
    } else {
        radioSemNF.checked = true;
        toggleSemNF.classList.add("ativo");
        toggleComNF.classList.remove("ativo");
    }
}

toggleComNF.onclick = () => selecionar("NF");
toggleSemNF.onclick = () => selecionar("SEM_NF");
</script>

<script type="module" src="js/notas_ver.js"></script>
</body>
</html>
