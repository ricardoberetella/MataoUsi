<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Nota Fiscal</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pedidos_lista.css">

    <style>
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal {
            background: #020617;
            padding: 20px;
            border-radius: 10px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(56,189,248,.4);
        }

        .modal h2 {
            margin-top: 0;
            color: #38bdf8;
        }

        .modal label {
            display: block;
            margin-top: 10px;
        }

        .modal input {
            width: 100%;
            padding: 8px;
        }

        .acoes-modal {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<header class="topbar">
    <a href="notas_lista.html">
        <button class="btn-voltar">⬅ Voltar</button>
    </a>
    <h1 class="topbar-title">Detalhes da Nota Fiscal</h1>
</header>

<div class="container">

    <!-- DADOS NF -->
    <section class="card">
        <h2 class="card-title">Informações da Nota Fiscal</h2>
        <p><strong>Número da NF:</strong> <span id="nfNumero"></span></p>
        <p><strong>Data:</strong> <span id="nfData"></span></p>
        <p><strong>Cliente:</strong> <span id="nfCliente"></span></p>
    </section>

    <!-- ITENS NF -->
    <section class="card">
        <h2 class="card-title">Itens da Nota Fiscal</h2>
        <table class="tabela">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Quantidade NF</th>
                </tr>
            </thead>
            <tbody id="listaItens"></tbody>
        </table>
    </section>

    <!-- BAIXAS -->
    <section class="card">
        <h2 class="card-title">Baixas Realizadas nos Pedidos</h2>
        <table class="tabela">
            <thead>
                <tr>
                    <th>Pedido</th>
                    <th>Produto</th>
                    <th>Qtd Baixada</th>
                    <th>Situação</th>
                </tr>
            </thead>
            <tbody id="listaBaixas"></tbody>
        </table>
    </section>

    <!-- BOLETOS -->
    <section class="card">
        <h2 class="card-title">Boletos</h2>

        <!-- ✅ BOTÃO QUE TINHA SUMIDO -->
        <button class="btn-verde" id="btnNovoBoleto">➕ Incluir Boleto</button>

        <table class="tabela" style="margin-top:10px;">
            <thead>
                <tr>
                    <th>Origem</th>
                    <th>Tipo</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaBoletos"></tbody>
        </table>
    </section>
</div>

<!-- MODAL INCLUIR / EDITAR -->
<div class="modal-overlay" id="modalBoleto">
    <div class="modal">
        <h2>Boleto</h2>

        <label>Origem</label>
        <input id="boletoOrigem">

        <label>Valor</label>
        <input id="boletoValor">

        <label>Vencimento</label>
        <input type="date" id="boletoVencimento">

        <div class="acoes-modal">
            <button class="btn-voltar" id="btnCancelarBoleto">Cancelar</button>
            <button class="btn-verde" id="btnSalvarBoleto">Salvar</button>
        </div>
    </div>
</div>

<script type="module" src="js/notas_ver.js"></script>
</body>
</html>
