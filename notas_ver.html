<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Nota Fiscal</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pedidos_lista.css">

    <style>
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal {
            background: #020617;
            padding: 20px;
            border-radius: 10px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(56,189,248,.4);
        }

        .grupo-radio {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .grupo-radio label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .acoes-modal {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<header class="topbar">
    <a href="notas_lista.html">
        <button class="btn-voltar">⬅ Voltar</button>
    </a>
    <h1 class="topbar-title">Detalhes da Nota Fiscal</h1>
</header>

<div class="container">
    <!-- (conteúdo da NF, itens, baixas e boletos permanece IGUAL) -->
</div>

<!-- MODAL BOLETO -->
<div class="modal-overlay" id="modalBoleto">
    <div class="modal">
        <h2>Boleto</h2>

        <!-- ✅ NOVO CAMPO -->
        <label>Vinculação</label>
        <div class="grupo-radio">
            <label>
                <input type="radio" name="tipo_nf" value="NF" checked>
                Com NF
            </label>
            <label>
                <input type="radio" name="tipo_nf" value="SEM_NF">
                Sem NF
            </label>
        </div>

        <label>Origem</label>
        <input id="boletoOrigem">

        <label>Valor</label>
        <input id="boletoValor" type="number" step="0.01">

        <label>Vencimento</label>
        <input type="date" id="boletoVencimento">

        <div class="acoes-modal">
            <button class="btn-voltar" id="btnCancelarBoleto">Cancelar</button>
            <button class="btn-verde" id="btnSalvarBoleto">Salvar</button>
        </div>
    </div>
</div>

<script type="module" src="js/notas_ver.js"></script>
</body>
</html>
