<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Detalhes da Nota Fiscal</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pedidos_lista.css">
</head>

<body>

<header class="topbar">
    <a href="notas_lista.html">
        <button class="btn-voltar">⬅ Voltar</button>
    </a>
    <h1 class="topbar-title">Detalhes da Nota Fiscal</h1>
</header>

<div class="container">

    <!-- ============================= -->
    <!-- INFORMAÇÕES DA NF -->
    <!-- ============================= -->
    <section class="card">
        <h2 class="card-title">Informações da Nota Fiscal</h2>

        <p><strong>Número:</strong> <span id="nfNumero">—</span></p>
        <p><strong>Data:</strong> <span id="nfData">—</span></p>
        <p><strong>Cliente:</strong> <span id="nfCliente">—</span></p>
    </section>

    <!-- ============================= -->
    <!-- ITENS DA NF -->
    <!-- ============================= -->
    <section class="card">
        <h2 class="card-title">Itens da Nota Fiscal</h2>

        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Quantidade NF</th>
                </tr>
            </thead>
            <tbody id="listaItens"></tbody>
        </table>
    </section>

    <!-- ============================= -->
    <!-- BAIXAS -->
    <!-- ============================= -->
    <section class="card">
        <h2 class="card-title">Baixas Realizadas nos Pedidos</h2>

        <table>
            <thead>
                <tr>
                    <th>Pedido (NF)</th>
                    <th>Produto</th>
                    <th>Qtd Baixada</th>
                    <th>Situação</th>
                </tr>
            </thead>
            <tbody id="listaBaixas"></tbody>
        </table>
    </section>

    <!-- ============================= -->
    <!-- BOLETOS -->
    <!-- ============================= -->
    <section class="card">
        <h2 class="card-title">Boletos</h2>

        <button id="btnNovoBoleto" class="btn-verde">+ Incluir Boleto</button>

        <table>
            <thead>
                <tr>
                    <th>Vinculação</th>
                    <th>Origem</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaBoletos"></tbody>
        </table>
    </section>

</div>

<!-- ============================= -->
<!-- MODAL BOLETO (OBRIGATÓRIO) -->
<!-- ============================= -->
<div id="modalBoleto" class="modal-overlay" style="display:none">
    <div class="modal">

        <h3>Boleto</h3>

        <div class="form-group">
            <label>Vinculação</label>
            <label><input type="radio" name="tipo_nf" value="NF" checked> Com NF</label>
            <label><input type="radio" name="tipo_nf" value="SEM_NF"> Sem NF</label>
        </div>

        <div class="form-group">
            <label>Origem</label>
            <input type="text" id="boletoOrigem">
        </div>

        <div class="form-group">
            <label>Valor</label>
            <input type="number" id="boletoValor" step="0.01">
        </div>

        <div class="form-group">
            <label>Vencimento</label>
            <input type="date" id="boletoVencimento">
        </div>

        <div class="acoes">
            <button id="btnSalvarBoleto" class="btn-verde">Salvar</button>
            <button id="btnCancelarBoleto" class="btn-vermelho">Cancelar</button>
        </div>

    </div>
</div>

<script type="module" src="notas_ver.js"></script>
</body>
</html>
