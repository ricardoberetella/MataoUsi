<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Nota Fiscal</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pedidos_lista.css">
</head>

<body>

<header class="topbar">
    <a href="notas_lista.html">
        <button class="btn-voltar">⬅ Voltar</button>
    </a>
    <h1 class="topbar-title">Detalhes da Nota Fiscal</h1>
</header>

<div class="container">

    <!-- ========================= -->
    <!-- DADOS DA NOTA -->
    <!-- ========================= -->
    <section class="card">
        <h2 class="card-title">Informações da Nota Fiscal</h2>
        <p><strong>Número da NF:</strong> <span id="nfNumero"></span></p>
        <p><strong>Data:</strong> <span id="nfData"></span></p>
        <p><strong>Cliente:</strong> <span id="nfCliente"></span></p>
    </section>

    <!-- ========================= -->
    <!-- ITENS DA NF -->
    <!-- ========================= -->
    <section class="card">
        <h2 class="card-title">Itens da Nota Fiscal</h2>
        <table class="tabela">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Quantidade NF</th>
                </tr>
            </thead>
            <tbody id="listaItens">
                <tr><td colspan="2">Carregando...</td></tr>
            </tbody>
        </table>
    </section>

    <!-- ========================= -->
    <!-- BAIXAS -->
    <!-- ========================= -->
    <section class="card">
        <h2 class="card-title">Baixas Realizadas nos Pedidos</h2>
        <table class="tabela">
            <thead>
                <tr>
                    <th>Pedido</th>
                    <th>Produto</th>
                    <th>Qtd Baixada</th>
                    <th>Situação</th>
                </tr>
            </thead>
            <tbody id="listaBaixas">
                <tr><td colspan="4">Carregando...</td></tr>
            </tbody>
        </table>
    </section>

    <!-- ========================= -->
    <!-- BOLETOS -->
    <!-- ========================= -->
    <section class="card">
        <h2 class="card-title">Boletos</h2>

        <button class="btn-verde" id="btnNovoBoleto">➕ Incluir Boleto</button>

        <table class="tabela" style="margin-top:10px;">
            <thead>
                <tr>
                    <th>Vinculação</th>
                    <th>Origem</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaBoletos">
                <tr><td colspan="5">Carregando...</td></tr>
            </tbody>
        </table>
    </section>

</div>

<script type="module" src="js/notas_ver.js"></script>
</body>
</html>
