<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Nota Fiscal</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pedidos_lista.css">

    <style>
        /* NÃO MOSTRA NA TELA */
        .cabecalho-print { display: none; }

        @media print {
            @page {
                size: A4 portrait;
                margin-top: 40mm;
                margin-bottom: 10mm;
                margin-left: 14mm;
                margin-right: 14mm;
            }

            body {
                background: #fff !important;
                color: #000 !important;
                font-family: Arial, sans-serif;
            }

            .topbar, button { display: none !important; }

            .container {
                background: #fff !important;
                box-shadow: none !important;
                border: none !important;
            }

            .cabecalho-print {
                display: flex !important;
                justify-content: center;
                align-items: center;
                gap: 12px;
                margin-bottom: 8px;
            }

            .cabecalho-print img { height: 55px; }

            .card {
                background: #fff !important;
                border: 1px solid #000 !important;
                margin-bottom: 6px !important;
            }

            th, td {
                border: 0.5px solid #000 !important;
                color: #000 !important;
            }
        }

        /* =============================
           MODAL BOLETOS (CORRIGIDO)
           ============================= */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: #020617;
            padding: 24px;
            border-radius: 14px;
            width: 100%;
            max-width: 520px;
            border: 1px solid rgba(56,189,248,0.4);
            box-shadow: 0 0 30px rgba(56,189,248,0.35);
        }

        .modal-content h2 {
            margin-top: 0;
            color: #38bdf8;
        }

        .modal-content label {
            font-size: 14px;
            display: block;
            margin-top: 10px;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 8px;
            background: #020617;
            color: #e5e7eb;
            border: 1px solid rgba(148,163,184,0.6);
            border-radius: 8px;
        }

        .modal-content input:focus,
        .modal-content select:focus {
            outline: none;
            border-color: #38bdf8;
        }

        .grupo-radio {
            display: flex;
            gap: 20px;
            margin-top: 6px;
        }

        .grupo-radio label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header class="topbar">
    <a href="notas_lista.html"><button class="btn-voltar">⬅ Voltar</button></a>
    <h1 class="topbar-title">Detalhes da Nota Fiscal</h1>
    <button class="btn-verde" onclick="window.print()">📄 Gerar PDF</button>
</header>

<div class="container">

    <div class="cabecalho-print">
        <img src="img/logo-mataousi2.png">
        <span>Matão Usinagem</span>
    </div>

    <section class="card">
        <h2 class="card-title">Informações da Nota Fiscal</h2>
        <p><strong>Número da NF:</strong> <span id="nfNumero"></span></p>
        <p><strong>Data:</strong> <span id="nfData"></span></p>
        <p><strong>Cliente:</strong> <span id="nfCliente"></span></p>
    </section>

    <section class="card">
        <h2 class="card-title">Itens da Nota Fiscal</h2>
        <table class="tabela">
            <thead><tr><th>Produto</th><th>Quantidade NF</th></tr></thead>
            <tbody id="listaItens"></tbody>
        </table>
    </section>

    <section class="card">
        <h2 class="card-title">Baixas Realizadas nos Pedidos</h2>
        <table class="tabela">
            <thead><tr><th>Pedido</th><th>Produto</th><th>Qtd Baixada</th><th>Situação</th></tr></thead>
            <tbody id="listaBaixas"></tbody>
        </table>
    </section>

    <section class="card">
        <h2 class="card-title">Boletos</h2>

        <div style="display:flex;gap:10px;margin-bottom:12px;">
            <button id="btnNovoBoleto" class="btn-verde">➕ Incluir Boleto</button>
            <select id="filtroBoletos">
                <option value="nf">Desta NF</option>
                <option value="sem">Sem NF</option>
                <option value="todos">Todos</option>
            </select>
        </div>

        <table class="tabela">
            <thead>
                <tr>
                    <th>Origem</th>
                    <th>Vínculo</th>
                    <th>NF Ref.</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaBoletos"></tbody>
        </table>
    </section>
</div>

<div id="modalBoleto" class="modal-overlay">
    <div class="modal-content">
        <h2 id="tituloModalBoleto">Novo Boleto</h2>

        <label>Vinculação:</label>
        <div class="grupo-radio">
            <label><input type="radio" name="vinculoBoleto" value="com" checked> Com NF</label>
            <label><input type="radio" name="vinculoBoleto" value="sem"> Sem NF</label>
        </div>

        <label>Origem:</label>
        <input id="boletoOrigem">

        <div id="areaSemNF" style="display:none;">
            <label>Tipo:</label>
            <select id="boletoTipoNF">
                <option value="SEM_NF">SEM NF</option>
            </select>

            <label>Nº NF Referência:</label>
            <input id="boletoNumeroNFRef">
        </div>

        <label>Valor:</label>
        <input id="boletoValor" type="number" step="0.01">

        <label>Vencimento:</label>
        <input id="boletoVencimento" type="date">

        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px;">
            <button id="btnCancelarBoleto" class="btn-voltar">Cancelar</button>
            <button id="btnSalvarBoleto" class="btn-verde">Salvar</button>
        </div>
    </div>
</div>

<script type="module" src="js/notas_ver.js"></script>
</body>
</html>
