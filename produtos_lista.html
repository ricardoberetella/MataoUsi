<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Produtos</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/produtos.css">

    <style>
        /* ===== MODAL ===== */
        .modal-filtros {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-conteudo {
            background: #1e293b;
            padding: 30px;
            width: 420px;
            border-radius: 12px;
            color: white;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        .modal-conteudo h2 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 20px;
        }

        .modal-conteudo label {
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
            color: #38bdf8;
        }

        .modal-conteudo select {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
        }

        .fechar {
            float: right;
            cursor: pointer;
            font-size: 26px;
            color: #fff;
            margin-top: -10px;
        }

        .linha-botoes-modal {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
        }

        /* ========================================================= */
        /*              IMPRESSÃO IGUAL IMPRESSÃO DE PEDIDOS        */
        /* ========================================================= */
  @media print {

    body * {
        visibility: hidden;
    }

    #printArea, #printArea * {
        visibility: visible !important;
    }

    #printArea {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;

        /* mesma margem dos pedidos */
        padding: 50px 60px 0 60px;

        font-family: Arial, sans-serif;
        overflow: visible !important;
    }

    /* ===== CABEÇALHO ===== */
    .print-header {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;

        /* mesma distância do modelo de pedidos */
        margin-bottom: 20px;
    }

    .print-info-left {
        display: flex;
        flex-direction: column;
    }

    .print-logo {
        width: 110px;
    }

    .print-company {
        font-size: 14px;
        font-weight: bold;
    }

    .print-info-right {
        text-align: right;
    }

    .print-sub {
        font-size: 11px;
    }

    .print-title {
        font-size: 14px;
        font-weight: bold;
        margin-top: 3px;
    }

    /* ===== TABELA ===== */
    .print-table {
        /* largura igual aos relatórios de pedidos */
        width: 85%;

        margin-left: auto;
        margin-right: auto;

        border-collapse: collapse;
        table-layout: fixed;

        /* borda externa */
        border: 1px solid #000;
    }

    .print-table th,
    .print-table td {
        font-size: 12px;
        padding: 6px;

        border: 1px solid #000;

        white-space: nowrap;
    }

    .no-print {
        display: none !important;
    }
}

    </style>
</head>

<body>

<header class="topbar no-print">
    <a href="dashboard.html" class="btn-voltar-menu">⬅ Voltar ao Menu</a>
    <h1 class="titulo-pagina">Lista de Produtos</h1>
</header>

<main class="page-container">

    <section class="card-externo no-print">
        <section class="card-interno">

            <h2 class="titulo-card">Produtos Cadastrados</h2>

            <div class="linha-botoes">
                <a href="produtos_novo.html">
                    <button class="btn-primario">Novo Produto</button>
                </a>

                <button id="btnFiltros" class="btn-primario">Filtros</button>

                <button id="btnImprimir" class="btn-primario" style="background:#10b981;">Imprimir</button>
            </div>

            <table class="tabela">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Descrição</th>
                        <th>Comp. (mm)</th>
                        <th>Peso Líq.</th>
                        <th>Peso Bruto</th>
                        <th>Valor Unit.</th>
                        <th>Acabamento</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaProdutos"></tbody>
            </table>

        </section>
    </section>

</main>

<!-- ===================== -->
<!-- ÁREA DE IMPRESSÃO     -->
<!-- ===================== -->
<div id="printArea" style="display:none;">

    <div class="print-header">
        <div class="print-info-left">
            <img src="img/logo-mataousi2.png" class="print-logo">
            <div class="print-company">MATÃO USINAGEM</div>
        </div>

        <div class="print-info-right">
            <div class="print-sub">Relatório gerado em: <span id="printDataHora"></span></div>
            <div class="print-title">Lista de Produtos</div>
        </div>
    </div>

    <table class="print-table" id="printTable"></table>
</div>

<!-- MODAL DE FILTROS -->
<div id="modalFiltros" class="modal-filtros">
    <div class="modal-conteudo">

        <span class="fechar" id="btnFecharFiltros">×</span>

        <h2>Filtros</h2>

        <label>Código</label>
        <select id="filtroCodigo">
            <option value="todos">Todos</option>
        </select>

        <label>Acabamento</label>
        <select id="filtroAcabamento">
            <option value="todos">Todos</option>
            <option value="Zincado">Zincado</option>
            <option value="Tratado">Tratado</option>
            <option value="Sem Acabamento">Sem Acabamento</option>
        </select>

        <div class="linha-botoes-modal">
            <button class="btn-excluir" id="btnLimparFiltros">Limpar</button>
            <button class="btn-primario" id="btnAplicarFiltros">Aplicar</button>
        </div>

    </div>
</div>

<script type="module" src="js/produtos.js"></script>

<script>
/* gera data e hora da impressão */
document.getElementById("btnImprimir").onclick = () => {
    const dataHora = new Date().toLocaleString("pt-BR");
    document.getElementById("printDataHora").innerText = dataHora;
};
</script>

</body>
</html>
