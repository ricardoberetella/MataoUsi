<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Produtos</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/produtos.css">

<style>
/* ===== MODAL ===== */
.modal-filtros {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.modal-conteudo {
    background: #1e293b;
    padding: 30px;
    width: 420px;
    border-radius: 12px;
    color: white;
    box-shadow: 0 0 20px rgba(0,255,255,0.3);
}

.modal-conteudo h2 {
    text-align: center;
    color: #38bdf8;
    margin-bottom: 20px;
}

.modal-conteudo label {
    display: block;
    margin-top: 10px;
    margin-bottom: 5px;
    color: #38bdf8;
}

.modal-conteudo select {
    width: 100%;
    padding: 10px;
    background: #0f172a;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: white;
}

.linha-botoes-modal {
    margin-top: 25px;
    display: flex;
    justify-content: space-between;
}

/* ===== IMPRESSÃO — IGUAL AO PEDIDOS ===== */
@media print {

    body * {
        visibility: hidden !important;
    }

    #printArea, #printArea * {
        visibility: visible !important;
    }

    #printArea {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        padding: 20px;
        font-size: 12px;
    }

    .print-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
    }

    .print-logo {
        width: 160px;
    }

    .print-info {
        text-align: right;
        font-size: 12px;
    }

    .print-title {
        font-size: 18px;
        font-weight: bold;
    }

    .print-sub {
        font-size: 11px;
    }

    .print-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        table-layout: fixed;
    }

    .print-table th,
    .print-table td {
        border: 1px solid #000;
        padding: 6px;
        font-size: 12px;
    }

    .no-print {
        display: none !important;
    }
}

</style>
</head>

<body>

<header class="topbar no-print">
    <a href="dashboard.html" class="btn-voltar-menu">⬅ Voltar ao Menu</a>
    <h1 class="titulo-pagina">Lista de Produtos</h1>
</header>

<main class="page-container">

    <section class="card-externo no-print">
        <section class="card-interno">

            <h2 class="titulo-card">Produtos Cadastrados</h2>

            <div class="linha-botoes">

                <a href="produtos_novo.html">
                    <button class="btn-primario">Novo Produto</button>
                </a>

                <button id="btnFiltros" class="btn-primario">Filtros</button>

                <button id="btnImprimir" class="btn-primario" style="background:#10b981;">Imprimir</button>

            </div>

            <table class="tabela">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Descrição</th>
                        <th>Comp. (mm)</th>
                        <th>Peso Líq.</th>
                        <th>Peso Bruto</th>
                        <th>Valor Unit.</th>
                        <th>Acabamento</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="listaProdutos"></tbody>
            </table>

        </section>
    </section>

</main>

<!-- ========================== -->
<!-- ÁREA EXATA DE IMPRESSÃO   -->
<!-- ========================== -->
<div id="printArea" style="display:none;">

    <div class="print-header">
        <img src="img/logo-mataousi2.png" class="print-logo">

        <div class="print-info">
            <div class="print-title">Lista de Produtos</div>
            <div class="print-sub">
                Relatório gerado em: <span id="printDataHora"></span>
            </div>
        </div>
    </div>

    <table class="print-table" id="printTable"></table>
</div>


<!-- ========================== -->
<!-- MODAL DE FILTROS          -->
<!-- ========================== -->
<div id="modalFiltros" class="modal-filtros">

    <div class="modal-conteudo">

        <span class="fechar" id="btnFecharFiltros">×</span>

        <h2>Filtros</h2>

        <label>Código</label>
        <select id="filtroCodigo">
            <option value="todos">Todos</option>
        </select>

        <label>Acabamento</label>
        <select id="filtroAcabamento">
            <option value="todos">Todos</option>
            <option value="Zincado">Zincado</option>
            <option value="Tratado">Tratado</option>
            <option value="Sem Acabamento">Sem Acabamento</option>
        </select>

        <div class="linha-botoes-modal">
            <button class="btn-excluir" id="btnLimparFiltros">Limpar</button>
            <button class="btn-primario" id="btnAplicarFiltros">Aplicar</button>
        </div>

    </div>
</div>

<script type="module" src="js/produtos.js"></script>

</body>
</html>
