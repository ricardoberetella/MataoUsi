<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Produtos</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/produtos.css">

    <style>
        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            width: 380px;
            color: #fff;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        .modal-content h2 {
            margin-top: 0;
            text-align: center;
            color: #38bdf8;
        }

        .modal-close {
            float: right;
            font-size: 22px;
            cursor: pointer;
            color: #aaa;
        }

        .modal-close:hover {
            color: white;
        }

        .modal-content label {
            margin-top: 10px;
            display: block;
            font-size: 15px;
        }

        .modal-content select,
        .modal-content input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            margin-top: 5px;
            background: #0f172a;
            color: white;
        }

        .modal-botoes {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        /* BOTÃO IMPRIMIR */
        .btn-imprimir {
            background: #0ea5e9;
            padding: 10px 15px;
            font-weight: bold;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            border: none;
        }
        .btn-imprimir:hover {
            background: #0284c7;
        }

        /* LAYOUT DE IMPRESSÃO */
        @media print {
            body * {
                visibility: hidden;
            }

            #printArea, #printArea * {
                visibility: visible;
            }

            #printArea {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                padding: 20px;
            }

            .print-table {
                border-collapse: collapse;
                width: 100%;
            }

            .print-table th, .print-table td {
                border: 1px solid black;
                padding: 6px;
                font-size: 14px;
            }

            .print-logo {
                width: 160px;
                margin-bottom: 15px;
            }

            .no-print {
                display: none !important;
            }
        }
    </style>
</head>

<body>

<header class="topbar no-print">
    <a href="dashboard.html" class="btn-voltar-menu">⬅ Voltar ao Menu</a>
    <h1 class="titulo-pagina">Lista de Produtos</h1>
</header>

<main class="page-container">

    <section class="card-externo no-print">
        <section class="card-interno">

            <h2 class="titulo-card">Produtos Cadastrados</h2>

            <div class="linha-botoes">
                <a href="produtos_novo.html">
                    <button class="btn-primario">Novo Produto</button>
                </a>

                <button id="btnFiltros" class="btn-primario">Filtros</button>

                <button id="btnImprimir" class="btn-imprimir">Imprimir</button>
            </div>

            <table class="tabela">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Descrição</th>
                        <th>Comp. (mm)</th>
                        <th>Peso Líq.</th>
                        <th>Peso Bruto</th>
                        <th>Valor Unit.</th>
                        <th>Acabamento</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaProdutos"></tbody>
            </table>

        </section>
    </section>

</main>

<!-- ÁREA OCULTA PARA IMPRESSÃO -->
<div id="printArea" style="display:none;">
    <img src="img/logo-mataousi2.png" class="print-logo">

    <h2 style="margin-top:0;">Lista de Produtos</h2>

    <table class="print-table" id="printTable"></table>
</div>


<!-- MODAL DE FILTROS -->
<div id="modalFiltros" class="modal">
    <div class="modal-content">

        <span id="modalClose" class="modal-close">×</span>
        <h2>Filtros</h2>

        <label>Código</label>
        <select id="filtroCodigo">
            <option value="todos">Todos</option>
        </select>

        <label>Acabamento</label>
        <select id="filtroAcabamento">
            <option value="todos">Todos</option>
            <option>Zincado</option>
            <option>Tratado</option>
            <option>Cru</option>
        </select>

        <div class="modal-botoes">
            <button id="btnLimpar" class="btn-excluir">Limpar</button>
            <button id="btnAplicar" class="btn-primario">Aplicar</button>
        </div>

    </div>
</div>

<script type="module" src="js/produtos.js"></script>

</body>
</html>
