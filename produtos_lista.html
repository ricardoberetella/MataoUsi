<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Produtos</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/produtos.css">

    <style>
        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            width: 380px;
            color: #fff;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        .modal-content h2 {
            margin-top: 0;
            text-align: center;
            color: #38bdf8;
        }

        .modal-content label {
            margin-top: 10px;
            display: block;
            font-size: 15px;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            margin-top: 5px;
            background: #0f172a;
            color: white;
        }

        .modal-close {
            float: right;
            font-size: 22px;
            cursor: pointer;
            color: #aaa;
        }

        .modal-close:hover {
            color: white;
        }

        .modal-botoes {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        .btn-excluir {
            background: #dc2626;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
        }

        .btn-excluir:hover {
            background: #b91c1c;
        }

        .btn-primario {
            background: #38bdf8;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            color: #000;
            font-weight: bold;
        }

        .btn-primario:hover {
            background: #0ea5e9;
        }
    </style>

</head>
<body>

<header class="topbar">
    <a href="dashboard.html" class="btn-voltar-menu">⬅ Voltar ao Menu</a>
    <h1 class="titulo-pagina">Lista de Produtos</h1>
</header>

<main class="page-container">

    <section class="card-externo">
        <section class="card-interno">

            <h2 class="titulo-card">Produtos Cadastrados</h2>

            <div class="linha-botoes">
                <a href="produtos_novo.html">
                    <button class="btn-primario">Novo Produto</button>
                </a>

                <button id="btnFiltros" class="btn-primario">Filtros</button>
            </div>

            <table class="tabela">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Descrição</th>
                        <th>Comp. (mm)</th>
                        <th>Peso Líq.</th>
                        <th>Peso Bruto</th>
                        <th>Valor Unit.</th>
                        <th>Acabamento</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaProdutos"></tbody>
            </table>

        </section>
    </section>

</main>

<!-- ========================= -->
<!--     MODAL DE FILTROS      -->
<!-- ========================= -->
<div id="modalFiltros" class="modal">
    <div class="modal-content">

        <span id="modalClose" class="modal-close">×</span>
        <h2>Filtros</h2>

        <label>Código</label>
        <select id="filtroCodigo">
            <option value="todos">Todos</option>
        </select>

        <label>Descrição</label>
        <input type="text" id="filtroDescricao">

        <label>Acabamento</label>
        <select id="filtroAcabamento">
            <option value="todos">Todos</option>
            <option value="Zincado">Zincado</option>
            <option value="Tratado">Tratado</option>
            <option value="Sem Acabamento">Sem Acabamento</option>
        </select>

        <div class="modal-botoes">
            <button id="btnLimpar" class="btn-excluir">Limpar</button>
            <button id="btnAplicar" class="btn-primario">Aplicar</button>
        </div>

    </div>
</div>

<script type="module" src="js/produtos.js"></script>

</body>
</html>
