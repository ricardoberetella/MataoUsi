<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel MataoUsi</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      background: #f1f5f9;
      display: flex;
    }
    .sidebar {
      width: 220px;
      background: #0f172a;
      color: #fff;
      padding-top: 20px;
      display: flex;
      flex-direction: column;
    }
    .sidebar h2 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 20px;
    }
    .menu-item {
      padding: 14px 20px;
      cursor: pointer;
      border-bottom: 1px solid #1e293b;
    }
    .menu-item:hover {
      background: #1e293b;
    }
    .content {
      flex: 1;
      padding: 20px;
      background: #fff;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>MataoUsi</h2>

    <div class="menu-item" onclick="carregarModulo('pecas')">⚙️ Cadastro de Peças</div>

    <div class="menu-item" onclick="logout()" style="margin-top:auto; background:#dc2626;">
      🚪 Sair
    </div>
  </div>

  <div class="content" id="conteudo">
    <h1>Painel MataoUsi</h1>
    <p>Selecione um módulo no menu.</p>
  </div>

  <!-- Aqui está o correto -->
  <script type="module" src="js/dashboard.js"></script>

</body>
</html>
