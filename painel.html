<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MataoUsi - Painel</title>
   
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      background: #f1f5f9;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #0f172a;
      color: #fff;
      padding-top: 20px;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 20px;
    }

    .menu-item {
      padding: 14px 20px;
      cursor: pointer;
      border-bottom: 1px solid #1e293b;
      font-size: 16px;
    }

    .menu-item:hover {
      background: #1e293b;
    }

    .content {
      flex: 1;
      padding: 20px;
      background: #fff;
    }

    .content h1 {
      margin-top: 0;
      color: #0f172a;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>MataoUsi</h2>

    <!-- CHAMA O MÓDULO DE PEÇAS -->
    <div class="menu-item" onclick="carregarModulo('pecas')">⚙️ Cadastro de Peças</div>

    <!-- SAIR -->
    <div class="menu-item" onclick="logout()" style="margin-top:auto; background:#dc2626;">
      🚪 Sair
    </div>
  </div>

  <!-- CONTEÚDO DINÂMICO -->
  <div class="content" id="conteudo">
    <h1>Painel MataoUsi</h1>
    <p>Selecione um módulo no menu.</p>
  </div>

  <!-- IMPORTA O DASHBOARD (NAVEGAÇÃO) -->
  <script type="module" src="./js/dashboard.js"></script>

  <!-- IMPORTA O MÓDULO DE PEÇAS (FORMULÁRIO E TABELA) -->
  <script type="module" src="./js/pecas.js"></script>

</body>
</html>
