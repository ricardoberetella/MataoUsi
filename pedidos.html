<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pedidos - Matao Usinagem</title>
  <link rel="stylesheet" href="CSS/pedidos.css">
  <script type="module" src="js/pedidos.js" defer></script>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-circle">MU</div>
    <span>Matao Usinagem</span>
  </div>
  <button onclick="window.location.href='painel.html'" class="btn-ghost">Voltar ao Painel</button>
</header>

<div class="card">

  <h1>Pedidos</h1>
  <p class="descricao">Visualize, filtre e abra pedidos cadastrados.</p>

  <!-- FILTROS -->
  <div class="filtros">
    <div class="field">
      <label>Nº Documento</label>
      <input id="f_numero" placeholder="Ex: 312.543" />
    </div>
    <div class="field">
      <label>Cliente</label>
      <input id="f_cliente" placeholder="Parte do nome..." />
    </div>
    <div class="field">
      <label>PC / OC</label>
      <input id="f_tipo" placeholder="PC ou OC" />
    </div>
    <div class="field">
      <label>Data</label>
      <input type="date" id="f_data" />
    </div>
    <button id="btnFiltrar" class="btn-primary">Filtrar</button>
    <button onclick="window.location.href='pedido_novo.html'" class="btn-blue">+ Novo Pedido</button>
  </div>

  <!-- LISTA -->
  <div class="table-wrapper">
    <table class="tabela">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nº Documento</th>
          <th>Cliente</th>
          <th>Data</th>
          <th>Total</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="listaPedidos"></tbody>
    </table>
  </div>

</div>

</body>
</html>
