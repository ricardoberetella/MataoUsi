<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pedidos</title>
  <link rel="stylesheet" href="css/pedidos.css">
</head>

<body>
  <h1 class="titulo">Pedidos</h1>

  <!-- BARRA DE BUSCA -->
  <div class="area-busca">
    <input type="text" id="campoBuscaPedidos" class="input-busca"
           placeholder="🔍 Buscar por número, cliente ou data...">
  </div>

  <!-- AÇÕES -->
  <div class="area-acoes">
    <button id="btnNovoPedido" class="btn-neon">
      + Novo Pedido
    </button>
  </div>

  <!-- LISTA DE PEDIDOS -->
  <div id="listaPedidos" class="lista-pedidos"></div>

  <!-- DETALHES DO PEDIDO -->
  <div id="detalhesPedido" class="detalhes hidden"></div>

  <!-- FORMULÁRIO DE PEDIDO (overlay) -->
  <section id="formContainer" class="form-container hidden">
    <div class="card-form">
      <h2 id="tituloForm">Novo Pedido</h2>

      <form id="formPedido">
        <div class="form-grid">
          <div class="form-group">
            <label for="cliente">Cliente *</label>
            <select id="cliente" required>
              <option value="">Selecione um cliente...</option>
            </select>
          </div>

          <div class="form-group">
            <label for="tipo_pedido">Tipo do Pedido *</label>
            <select id="tipo_pedido" required>
              <option value="OC">OC - Ordem de Compra</option>
              <option value="PC">PC - Pedido de Compra</option>
            </select>
          </div>

          <div class="form-group">
            <label for="numero_pedido">Número do Pedido *</label>
            <input type="text" id="numero_pedido"
                   placeholder="Digite apenas o número. Ex: 125" required>
          </div>

          <div class="form-group">
            <label for="data_pedido">Data do Pedido *</label>
            <input type="date" id="data_pedido" required>
          </div>
        </div>

        <div class="form-group">
          <label for="observacoes">Observações</label>
          <textarea id="observacoes" rows="3"
                    placeholder="Digite alguma observação se necessário..."></textarea>
        </div>

        <h3 class="subtitulo">Itens do Pedido</h3>

        <div class="tabela-itens-wrapper">
          <table class="tabela-itens">
            <thead>
              <tr>
                <th style="width: 40%;">Produto</th>
                <th style="width: 15%;">Qtd</th>
                <th style="width: 20%;">Valor Unit. (R$)</th>
                <th style="width: 20%;">Total (R$)</th>
                <th style="width: 5%;"></th>
              </tr>
            </thead>
            <tbody id="tbodyItens">
              <!-- linhas de itens criadas via JS -->
            </tbody>
          </table>
        </div>

        <button type="button" id="btnAdicionarItem" class="btn-add-item">
          + Adicionar Item
        </button>

        <div class="total-geral-linha">
          <span>Total do Pedido:</span>
          <strong id="totalGeral">R$ 0,00</strong>
        </div>

        <div class="actions-form">
          <button type="submit" class="btn-salvar">Salvar Pedido</button>
          <button type="button" id="btnCancelarPedido" class="btn-cancelar">Cancelar</button>
        </div>
      </form>
    </div>
  </section>

  <!-- BOTÃO VOLTAR -->
  <a href="dashboard.html" class="btn-voltar">← Voltar</a>

  <script type="module" src="js/pedidos.js"></script>
</body>
</html>
