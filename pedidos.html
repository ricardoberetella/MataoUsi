<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos - MataoUsi</title>

  <link rel="stylesheet" href="css/pedidos.css">
</head>

<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <button class="btn-voltar" onclick="window.location.href='dashboard.html'">⬅ Voltar</button>
    <h1>Pedidos</h1>
    <button id="btnNovoPedido" class="btn-novo">+ Novo Pedido</button>
  </header>

  <!-- LISTA DE PEDIDOS -->
  <section class="container">
    <h2>Listagem de Pedidos</h2>

    <div id="listaPedidos" class="lista">
      <!-- Lista carregada via JS -->
    </div>
  </section>

  <!-- MODAL DE NOVO PEDIDO -->
  <div id="modalPedido" class="modal hidden">
    <div class="modal-content">
      <h3>Novo Pedido</h3>

      <label>Cliente</label>
      <select id="clienteId"></select>

      <label>Observações</label>
      <textarea id="observacoes"></textarea>

      <div class="actions">
        <button id="btnSalvarPedido" class="btn-salvar">Salvar Pedido</button>
        <button id="btnCancelarPedido" class="btn-cancelar">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/pedidos.js"></script>
</body>
</html>
