<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos - MataoUsi</title>

  <link rel="stylesheet" href="css/pedidos.css">

  <!-- Supabase -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./js/config.js";

    window.supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>
</head>

<body>

  <h2>Pedidos</h2>

  <!-- BOTÃO FUTURISTA VOLTAR AO MENU -->
  <div style="text-align:right; margin: 10px 30px;">
    <button onclick="location.href='dashboard.html'"
      style="
        background: #38bdf8;
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        font-size: 15px;
        color: #000;
        box-shadow: 0 0 12px rgba(56,189,248,0.8);
        transition: 0.3s;
      "
      onmouseover="this.style.boxShadow='0 0 20px rgba(56,189,248,1)'"
      onmouseout="this.style.boxShadow='0 0 12px rgba(56,189,248,0.8)'"
    >
      ⬅ Voltar ao Menu
    </button>
  </div>

  <div class="container">

    <!-- ABAS -->
    <div class="tabs">
      <button class="tab active" data-tab="cadastro">Criar Pedido</button>
      <button class="tab" data-tab="lista">Listar Pedidos</button>
    </div>

    <!-- ================== CADASTRAR PEDIDO ================== -->
    <div id="cadastro" class="tab-content active">

      <form id="formPedido">
        <input type="hidden" id="pedidoId">

        <!-- CLIENTE -->
        <label>Cliente</label>
        <select id="cliente_id" required></select>

        <!-- NÚMERO DO PEDIDO DO CLIENTE -->
        <label>Número do Pedido (fornecido pelo cliente)</label>
        <input type="text" id="numero_pedido" required>

        <!-- DATAS -->
        <label>Data do Pedido</label>
        <input type="date" id="data_pedido">

        <label>Data de Entrega</label>
        <input type="date" id="data_entrega">

        <!-- STATUS -->
        <label>Status</label>
        <select id="status">
          <option value="Aberto">Aberto</option>
          <option value="Entregue">Entregue</option>
          <option value="Cancelado">Cancelado</option>
        </select>

        <div class="btns">
          <button type="submit">Salvar Pedido</button>
          <button type="button" id="btnCancelar">Cancelar</button>
        </div>

      </form>

    </div>

    <!-- ================== LISTAR PEDIDOS ================== -->
    <div id="lista" class="tab-content">

      <input type="text" id="busca" placeholder="Buscar por cliente ou nº do pedido">

      <table>
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Nº Pedido</th>
            <th>Data Pedido</th>
            <th>Entrega</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody id="tabelaPedidos"></tbody>
      </table>

    </div>

  </div>

  <!-- JS do módulo -->
  <script type="module" src="js/pedidos.js"></script>

</body>
</html>
