<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos - Mini ERP</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f1f5f9; color: #0f172a; }
    select, input, button { padding: 8px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
    button { background: #3b82f6; color: #fff; border: none; cursor: pointer; }
    button:hover { background: #2563eb; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #e2e8f0; }
    a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <h1>Pedidos</h1>
  <a href="dashboard.html">← Voltar ao Dashboard</a>

  <h3>Novo Pedido</h3>
  <label>Cliente:</label>
  <select id="cliente"></select><br>
  <label>Peça:</label>
  <select id="peca"></select><br>
  <label>Quantidade:</label>
  <input type="number" id="quantidade" min="1" value="1"><br>
  <button id="btnCadastrar">Registrar Pedido</button>

  <h3>Lista de Pedidos</h3>
  <table id="tabelaPedidos">
    <thead>
      <tr>
        <th>Cliente</th>
        <th>Peça</th>
        <th>Quantidade</th>
        <th>Data</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script type="module" src="./pedidos.js"></script>
</body>
</html>
