<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Pedido</title>

  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/pedidos.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo-text">MataoUsi</span>
      <span class="topbar-module">Novo Pedido</span>
    </div>
    <div class="topbar-right">
      <a href="pedidos_lista.html" class="btn-secondary">Voltar à Lista</a>
    </div>
  </header>

  <main class="page-container page-grid">
    <!-- CARD DADOS DO PEDIDO -->
    <section class="card">
      <div class="card-header">
        <h1>Dados do Pedido</h1>
      </div>

      <form id="formPedido" class="form-grid">
        <div class="field-group">
          <label for="cliente_id">Cliente</label>
          <select id="cliente_id" required>
            <option value="">Selecione o cliente</option>
            <!-- preenchido via JS -->
          </select>
        </div>

        <div class="field-group">
          <label for="data_pedido">Data do Pedido</label>
          <input type="date" id="data_pedido" required>
        </div>

        <div class="field-group">
          <label for="tipo_pedido">Tipo de Pedido</label>
          <select id="tipo_pedido" required>
            <option value="">Selecione</option>
            <option value="Venda">Venda</option>
            <option value="Orçamento">Orçamento</option>
            <option value="Interno">Interno</option>
          </select>
        </div>

        <div class="field-group">
          <label for="numero_pedido">Número do Pedido</label>
          <input type="text" id="numero_pedido" placeholder="Ex: 1024" required>
        </div>

        <div class="field-group field-full">
          <label for="observacoes">Observações</label>
          <textarea id="observacoes" rows="3" placeholder="Informações adicionais do pedido"></textarea>
        </div>

        <div class="buttons-row field-full">
          <button type="button" id="btnSalvarPedido" class="btn-primary">Salvar Pedido</button>
          <button type="button" id="btnCancelar" class="btn-outline">Cancelar</button>
        </div>
      </form>
    </section>

    <!-- CARD ITENS DO PEDIDO -->
    <section class="card">
      <div class="card-header">
        <h2>Itens do Pedido</h2>
        <span class="badge" id="badgeTotal">Total: R$ 0,00</span>
      </div>

      <div class="itens-form-grid">
        <div class="field-group">
          <label for="codigo_produto">Código do Produto</label>
          <input type="text" id="codigo_produto" placeholder="Ex: 1234">
        </div>

        <div class="field-group">
          <label>&nbsp;</label>
          <button type="button" id="btnBuscarProduto" class="btn-secondary block">
            Buscar Produto
          </button>
        </div>

        <div class="field-group">
          <label>Descrição</label>
          <div id="descricao_produto" class="info-box">-</div>
        </div>

        <div class="field-group">
          <label>Preço Unit. (R$)</label>
          <div id="preco_produto" class="info-box">0,00</div>
        </div>

        <div class="field-group">
          <label for="quantidade">Quantidade</label>
          <input type="number" id="quantidade" min="0" step="0.01" placeholder="0,00">
        </div>

        <div class="field-group">
          <label>&nbsp;</label>
          <button type="button" id="btnAdicionarItem" class="btn-primary block">
            Adicionar Item
          </button>
        </div>
      </div>

      <div class="tabela-wrapper">
        <table class="tabela-futurista">
          <thead>
            <tr>
              <th>Código</th>
              <th>Descrição</th>
              <th>Qtd</th>
              <th>Vlr Unit. (R$)</th>
              <th>Total (R$)</th>
              <th class="col-acoes">Remover</th>
            </tr>
          </thead>
          <tbody id="tbodyItens">
            <!-- itens via JS -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="js/pedidos.js"></script>
</body>
</html>
