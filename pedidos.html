<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos - MataoUsi</title>
  <link rel="stylesheet" href="css/pedidos.css">
</head>
<body>
  <!-- Topbar -->
  <header class="topbar">
    <div class="logo-area">
      <div class="logo-circle">MU</div>
      <div class="logo-text">
        <span class="app-name">Matao Usinagem</span>
        <span class="app-subtitle">Módulo de Pedidos</span>
      </div>
    </div>
    <button class="btn btn-ghost" type="button" onclick="window.location.href='dashboard.html'">
      Voltar ao Painel
    </button>
  </header>

  <main class="page">
    <section class="card">
      <div class="card-header">
        <div>
          <h1>Pedidos</h1>
          <p>Visualize, edite e exclua pedidos realizados.</p>
        </div>
        <div class="card-actions">
          <button id="btnNovoPedido" class="btn btn-primary" type="button">
            + Novo Pedido
          </button>
        </div>
      </div>

      <div class="filtros">
        <div class="field">
          <label for="filtroNumero">Número do Pedido</label>
          <input type="text" id="filtroNumero" placeholder="Ex: P-0001">
        </div>
        <div class="field">
          <label for="filtroCliente">Cliente</label>
          <input type="text" id="filtroCliente" placeholder="Parte do nome do cliente">
        </div>
        <div class="field field-small">
          <label>&nbsp;</label>
          <button id="btnFiltrar" class="btn btn-secondary" type="button">Filtrar</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table class="tabela">
          <thead>
            <tr>
              <th>ID</th>
              <th>Número</th>
              <th>Cliente</th>
              <th>Data</th>
              <th>Tipo</th>
              <th>Total</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbodyPedidos">
            <!-- Linhas preenchidas via JS -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="pedidos.js"></script>
</body>
</html>
