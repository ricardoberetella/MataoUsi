<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Itens do Pedido - MataoUsi</title>

  <link rel="stylesheet" href="css/pedidos.css" />
  <link rel="stylesheet" href="css/pedido_itens.css" />
</head>

<body>

  <!-- TOPBAR FUTURISTA -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo-text">MataoUsi</span>
      <span class="topbar-module">Itens do Pedido</span>
    </div>

    <div class="topbar-right">
      <a href="pedidos_lista.html" class="btn-secondary">Voltar</a>
    </div>
  </header>

  <main class="page-container">

    <!-- CARD DO CABEÇALHO DO PEDIDO -->
    <section class="card">
      <h1 class="titulo-card">Detalhes do Pedido</h1>
      <p id="infoPedido" class="info-texto"></p>
    </section>

    <!-- CARD DOS ITENS -->
    <section class="card">

      <div class="card-header">
        <h2>Itens do Pedido</h2>
      </div>

      <div class="tabela-wrapper">
        <table class="tabela-futurista">
          <thead>
            <tr>
              <th>Código</th>
              <th>Descrição</th>
              <th>Qtd Sol.</th>
              <th>Qtd Entregue</th>
              <th>Restante</th>
              <th>Unit. (R$)</th>
              <th>Total (R$)</th>
              <th>Entrega</th>
              <th>Status</th>
              <th class="col-acoes">Ações</th>
            </tr>
          </thead>

          <tbody id="listaItens"></tbody>

        </table>
      </div>

    </section>

  </main>

  <script type="module" src="js/pedido_itens.js"></script>
</body>

</html>
