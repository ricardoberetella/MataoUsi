<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro de Pedidos por Produto</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pedidos_filtro_produto.css">
</head>

<body>

    <header class="topbar">
        <h1>Filtro de Pedidos por Produto</h1>
        <a href="dashboard.html">
            <button class="btn-voltar">Voltar</button>
        </a>
    </header>

    <div class="container">

        <!-- CABEÇALHO PARA IMPRESSÃO -->
        <div class="print-header">
            <img src="/img/logo-mataousi2.png" class="logo-print">
            <span class="titulo-print">MATÃO USINAGEM</span>
        </div>

        <!-- INFORMAÇÕES DO RELATÓRIO -->
        <div class="print-info">
            Relatório gerado em: <span id="dataGerada"></span><br>
            Cliente: <span id="clienteNome"></span>
        </div>

        <section class="card">

            <h2>Selecione o Produto</h2>

            <select id="produtoSelect" class="campo-select"></select>

            <div class="botoes-acoes">
                <button id="btnFiltrar" class="btn-filtrar">Filtrar Pedidos</button>
                <button id="btnImprimir" class="btn-imprimir">Imprimir</button>
            </div>

            <table id="tabelaResultados">
                <thead>
                    <tr>
                        <th>Pedido</th>
                        <th>Entrega</th>
                        <th>Código</th>
                        <th>Quantidade</th>
                    </tr>
                </thead>

                <tbody></tbody>

                <tfoot>
                    <tr>
                        <td colspan="3" class="total-label">TOTAL:</td>
                        <td id="totalGeral" class="total-valor"></td>
                    </tr>
                </tfoot>
            </table>

        </section>
    </div>

    <script type="module" src="js/pedidos_filtro_produto.js"></script>

</body>

</html>
