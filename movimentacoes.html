<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movimentações - MataoUsi</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* MENU LATERAL */
    .sidebar {
      width: 240px;
      background: #0f172a;
      color: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2 {
      color: #38bdf8;
      margin-bottom: 20px;
      text-align: center;
    }

    .menu-item {
      padding: 12px;
      margin: 6px 0;
      background-color: rgba(255,255,255,0.1);
      border-radius: 5px;
      cursor: pointer;
      text-align: center;
    }

    .menu-item:hover {
      background-color: rgba(255,255,255,0.2);
    }

    .menu-item a {
      text-decoration: none;
      color: white;
      font-size: 15px;
      display: block;
    }

    .menu-item.active {
      background-color: rgba(56,189,248,0.4);
    }

    /* CONTEÚDO PRINCIPAL */
    .content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .header h1 {
      margin: 0;
    }

    .btn-logout {
      padding: 10px 14px;
      background: #ef4444;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-logout:hover {
      background: #dc2626;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #e2e8f0;
      padding: 8px;
      font-size: 14px;
      text-align: left;
    }

    th {
      background: #e5e7eb;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #cbd5f5;
      box-sizing: border-box;
    }

    .btn-primary {
      padding: 10px 14px;
      background: #38bdf8;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    .btn-primary:hover {
      background: #0ea5e9;
    }

    .btn-danger {
      padding: 6px 10px;
      background: #ef4444;
      border: none;
      color: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .msg {
      margin-top: 10px;
      font-size: 14px;
    }

    .msg.ok {
      color: #16a34a;
    }

    .msg.err {
      color: #dc2626;
    }

    .entrada {
      color: #15803d;
      font-weight: bold;
    }

    .saida {
      color: #b91c1c;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- MENU LATERAL -->
  <div class="sidebar">
    <h2>MataoUsi</h2>

    <div class="menu-item"><a href="dashboard.html">🏠 Início</a></div>
    <div class="menu-item"><a href="empresas.html">🏭 Empresas</a></div>
    <div class="menu-item"><a href="produtos.html">📦 Produtos</a></div>
    <div class="menu-item"><a href="fornecedores.html">🚚 Fornecedores</a></div>
    <div class="menu-item"><a href="estoque.html">📊 Estoque</a></div>
    <div class="menu-item active"><a href="movimentacoes.html">📝 Movimentações</a></div>

    <div class="menu-item">
      <a href="https://github.com/ricardoberetella/MataoUsi" target="_blank">🔗 GitHub</a>
    </div>
  </div>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="content">

    <div class="header">
      <h1>Movimentações de Estoque</h1>
      <button class="btn-logout" id="btnLogout">Sair</button>
    </div>

    <!-- FORMULÁRIO -->
    <div class="card">
      <h2>Registrar Movimentação</h2>
      <form id="formMov">

        <div class="form-grid">

          <div>
            <label>Produto</label>
            <select id="produto_id" required></select>
          </div>

          <div>
            <label>Tipo</label>
            <select id="tipo" required>
              <option value="entrada">Entrada</option>
              <option value="saida">Saída</option>
            </select>
          </div>

          <div>
            <label>Quantidade</label>
            <input type="number" id="quantidade" min="1" required />
          </div>

          <div>
            <label>Motivo</label>
            <input type="text" id="motivo" placeholder="Ex: Produção, Ajuste..." />
          </div>

          <div>
            <label>Referência</label>
            <input type="text" id="referencia_id" placeholder="Ex: Pedido 1234" />
          </div>

        </div>

        <button class="btn-primary" type="submit">Registrar</button>
        <div id="msgForm" class="msg"></div>
      </form>
    </div>

    <!-- LISTAGEM -->
    <div class="card">
      <h2>Histórico de Movimentações</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Produto</th>
            <th>Tipo</th>
            <th>Qtd</th>
            <th>Motivo</th>
            <th>Referência</th>
            <th>Data</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody id="tbodyMov"></tbody>
      </table>

      <div id="msgLista" class="msg"></div>
    </div>

  </div>

  <!-- SUPABASE SCRIPT -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const msgForm = document.getElementById("msgForm");
    const msgLista = document.getElementById("msgLista");
    const tbody = document.getElementById("tbodyMov");
    const selectProduto = document.getElementById("produto_id");

    // LOGOUT
    document.getElementById("btnLogout").addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.href = "index.html";
    });

    // Carregar ao abrir
    window.addEventListener("DOMContentLoaded", () => {
      carregarProdutos();
      carregarMovimentacoes();
    });

    // CARREGAR PRODUTOS
    async function carregarProdutos() {
      const { data, error } = await supabase.from("produtos").select("*").order("nome");

      if (error) {
        alert("Erro ao carregar produtos!");
        return;
      }

      selectProduto.innerHTML = "";
      data.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = `${p.nome} (SKU: ${p.sku})`;
        selectProduto.appendChild(opt);
      });
    }

    // CARREGAR MOVIMENTAÇÕES
    async function carregarMovimentacoes() {
      msgLista.textContent = "Carregando...";

      const { data, error } = await supabase
        .from("movimentacoes")
        .select(`
          *,
          produtos (nome, sku)
        `)
        .order("criado_em", { ascending: false });

      if (error) {
        msgLista.textContent = "Erro ao carregar: " + error.message;
        msgLista.classList.add("err");
        return;
      }

      msgLista.textContent = "";
      tbody.innerHTML = "";

      if (data.length === 0) {
        msgLista.textContent = "Nenhuma movimentação registrada.";
        return;
      }

      data.forEach(m => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${m.id}</td>
          <td>${m.produtos?.nome ?? "Excluído"}</td>
          <td class="${m.tipo === "entrada" ? "entrada" : "saida"}">${m.tipo.toUpperCase()}</td>
          <td>${m.quantidade}</td>
          <td>${m.motivo ?? ""}</td>
          <td>${m.referencia_id ?? ""}</td>
          <td>${m.criado_em ?? ""}</td>
          <td>
            <button class="btn-danger" data-id="${m.id}">Excluir</button>
          </td>
        `;

        tbody.appendChild(tr);
      });

      document.querySelectorAll(".btn-danger").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const id = btn.getAttribute("data-id");
          if (confirm("Excluir movimentação?")) excluirMovimentacao(id);
        });
      });
    }

    // SALVAR MOVIMENTAÇÃO
    document.getElementById("formMov").addEventListener("submit", async (e)=>{
      e.preventDefault();

      const novo = {
        produto_id: selectProduto.value,
        tipo: document.getElementById("tipo").value,
        quantidade: parseInt(document.getElementById("quantidade").value),
        motivo: document.getElementById("motivo").value.trim(),
        referencia_id: document.getElementById("referencia_id").value.trim(),
        usuario_id: (await supabase.auth.getUser()).data.user?.id ?? null
      };

      const { error } = await supabase.from("movimentacoes").insert([novo]);

      if (error) {
        msgForm.textContent = "Erro ao registrar: " + error.message;
        msgForm.className = "msg err";
        return;
      }

      // Atualizar estoque automaticamente
      await atualizarEstoque(novo);

      msgForm.textContent = "Movimentação registrada!";
      msgForm.className = "msg ok";

      document.getElementById("formMov").reset();
      carregarMovimentacoes();
    });

    // ATUALIZAR ESTOQUE
    async function atualizarEstoque(mov) {
      let { data: est } = await supabase
        .from("estoque")
        .select("*")
        .eq("produto_id", mov.produto_id)
        .limit(1)
        .single();

      if (!est) {
        // criar se não existir
        await supabase.from("estoque").insert([{
          produto_id: mov.produto_id,
          quantidade: mov.tipo === "entrada" ? mov.quantidade : -mov.quantidade,
          local: "Padrão"
        }]);
        return;
      }

      const novaQtd =
        mov.tipo === "entrada"
          ? est.quantidade + mov.quantidade
          : est.quantidade - mov.quantidade;

      await supabase
        .from("estoque")
        .update({ quantidade: novaQtd })
        .eq("id", est.id);
    }

    // EXCLUIR
    async function excluirMovimentacao(id) {
      const { error } = await supabase.from("movimentacoes").delete().eq("id", id);

      if (error) {
        msgLista.textContent = "Erro ao excluir!";
        msgLista.className = "msg err";
        return;
      }

      msgLista.textContent = "Movimentação excluída.";
      msgLista.className = "msg ok";

      carregarMovimentacoes();
    }
  </script>

</body>
</html>
