<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Cliente</title>
    <link rel="stylesheet" href="css/clientes.css">
</head>

<body>

    <h1 class="titulo">Cadastrar Cliente</h1>

    <form id="formNovoCliente" class="formulario">

        <label>Razão Social</label>
        <input type="text" id="razao_social" required>

        <label>CNPJ</label>
        <input type="text" id="cpf_cnpj" required>

        <label>Telefone</label>
        <input type="text" id="telefone">

        <label>Email</label>
        <input type="email" id="email">

        <label>Endereço</label>
        <textarea id="endereco"></textarea>

        <button class="btn-primary" type="submit">Salvar</button>
        <button class="btn-secondary" type="button" onclick="window.location.href='clientes.html'">Cancelar</button>

    </form>

    <script type="module" src="js/clientes_cadastrar.js"></script>
</body>
</html>
