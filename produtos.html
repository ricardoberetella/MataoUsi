<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos</title>

  <link rel="stylesheet" href="css/produtos.css">
</head>

<body>

  <header class="topbar">
    <button onclick="window.location.href='dashboard.html'" class="voltar">⬅ Voltar</button>
    <h1>Produtos</h1>
  </header>

  <div class="container">

    <form id="formProduto" class="card">

      <h2>Cadastrar / Editar Produto</h2>

      <div class="grid">
        <input type="text" id="codigo" placeholder="Código">
        <input type="text" id="descricao" placeholder="Descrição">
        <input type="text" id="unidade" placeholder="Unidade (UN, KG...)">
        <input type="number" id="comprimento_mm" placeholder="Comprimento (mm)">

        <select id="acabamento">
          <option value="">Acabamento</option>
          <option value="Zincado">Zincado</option>
          <option value="Tratado">Tratado</option>
        </select>

        <input type="text" id="peso_bruto" placeholder="Peso Bruto">
        <input type="text" id="peso_liquido" placeholder="Peso Líquido">
        <input type="text" id="preco_custo" placeholder="Preço de Custo">
        <input type="text" id="preco_venda" placeholder="Preço de Venda">
      </div>

      <div class="btn-area">
        <button id="btnSalvar" type="submit" class="btn-primary">Salvar</button>
        <button id="btnCancelar" type="button" class="btn-secondary" style="display:none;">Cancelar</button>
      </div>

    </form>

    <div class="card">
      <h2>Lista de Produtos</h2>

      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>Cód</th>
              <th>Descrição</th>
              <th>UN</th>
              <th>Comp</th>
              <th>Acab</th>
              <th>P. Bruto</th>
              <th>P. Líquido</th>
              <th>Custo</th>
              <th>Venda</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="listaProdutos"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script type="module" src="js/produtos.js"></script>
</body>

</html>
