<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Produtos - MataoUsi</title>

    <link rel="stylesheet" href="dashboard.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            margin: 0;
            padding: 0;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            background: #1e293b;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 0 15px rgba(0,0,0,0.45);
        }

        h1 {
            margin-bottom: 20px;
            color: #38bdf8;
        }

        .btn-voltar {
            float: right;
            background: none;
            border: 2px solid #38bdf8;
            padding: 8px 25px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: -5px;
            transition: 0.2s;
        }

        .btn-voltar:hover {
            background: #38bdf8;
        }

        /* ⚡ FORMULÁRIO PREMIUM */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
            margin-top: 10px;
        }

        label {
            font-size: 0.88rem;
            margin-bottom: 3px;
            display: block;
            color: #cbd5e1;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 7px;
            background: #e2e8f0;
            color: #000;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .form-full {
            grid-column: span 2;
        }

        @media (max-width: 700px) {
            .form-full {
                grid-column: span 1;
            }
        }

        .btn-salvar {
            background: #10b981;
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 30px;
            cursor: pointer;
            float: right;
            margin-top: 10px;
            font-size: 1rem;
            transition: 0.25s;
        }

        .btn-salvar:hover {
            background: #059669;
        }

        .msg-erro {
            color: #f87171;
            margin-top: 6px;
        }
        .msg-sucesso {
            color: #4ade80;
            margin-top: 6px;
        }

        /* ⚡ TABELA PREMIUM */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 40px;
        }

        th {
            background: #0f172a;
            padding: 10px;
            text-align: left;
            font-size: 0.9rem;
        }

        td {
            padding: 10px;
        }

        tr:nth-child(even) {
            background: #334155;
        }

        .col-acoes button {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            color: white;
            font-size: 0.85rem;
        }

        .btn-editar { background: #3b82f6; }
        .btn-excluir { background: #ef4444; }

        .col-acoes {
            display: flex;
            gap: 6px;
        }

        /* ⚡ MODAL PREMIUM */
        #modalEditar.hidden { display: none; }

        #modalEditar {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.65);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e293b;
            padding: 25px;
            width: 480px;
            border-radius: 12px;
        }

        .modal-footer {
            text-align: right;
            margin-top: 12px;
        }

        .btn-cancelar {
            background: #ef4444;
            padding: 10px 18px;
            border-radius: 7px;
            border: none;
            cursor: pointer;
            color: white;
        }

        .btn-salvar-edit {
            background: #10b981;
            padding: 10px 18px;
            border-radius: 7px;
            border: none;
            cursor: pointer;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">

    <button class="btn-voltar" onclick="window.location.href='painel.html'">
        ← Voltar ao painel
    </button>

    <h1>Cadastro de Produtos</h1>

    <form id="produtoForm">

        <div class="form-grid">

            <div>
                <label>Código</label>
                <input type="text" name="codigo" required>
            </div>

            <div>
                <label>Descrição</label>
                <input type="text" name="descricao" required>
            </div>

            <div>
                <label>Unidade</label>
                <input type="text" name="unidade">
            </div>

            <div>
                <label>Comprimento (mm)</label>
                <input type="text" name="comprimento">
            </div>

            <div>
                <label>Acabamento</label>
                <input type="text" name="acabamento">
            </div>

            <div>
                <label>Peso Líquido (kg)</label>
                <input type="text" name="peso_liquido">
            </div>

            <div>
                <label>Peso Bruto (kg)</label>
                <input type="text" name="peso_bruto">
            </div>

            <div>
                <label>Preço de Custo (R$)</label>
                <input type="text" name="preco_custo">
            </div>

            <div class="form-full">
                <label>Preço de Venda (R$)</label>
                <input type="text" name="preco_venda">
            </div>

        </div>

        <div id="mensagemForm" class="msg-erro" style="display:none;"></div>

        <button type="submit" class="btn-salvar">Salvar produto</button>
    </form>

    <h2 style="margin-top: 50px;">Produtos cadastrados</h2>

    <label>Buscar por código:</label>
    <input id="buscaCodigo" type="text" placeholder="Digite o código" style="width:250px; margin-bottom:15px;">

    <table id="tabelaProdutos">
        <thead>
        <tr>
            <th>Código</th>
            <th>Descrição</th>
            <th>Unidade</th>
            <th>Comprimento (mm)</th>
            <th>Acabamento</th>
            <th>Peso Líquido (kg)</th>
            <th>Peso Bruto (kg)</th>
            <th>Preço de Custo</th>
            <th>Preço de Venda</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
            <tr><td colspan="10">Carregando...</td></tr>
        </tbody>
    </table>

</div>

<!-- MODAL EDITAR -->
<div id="modalEditar" class="hidden">
    <div class="modal-content">
        <h3>Editar Produto</h3>

        <form id="formEditar">

            <input type="hidden" id="edit_id">

            <label>Código</label>
            <input type="text" id="edit_codigo">

            <label>Descrição</label>
            <input type="text" id="edit_descricao">

            <label>Unidade</label>
            <input type="text" id="edit_unidade">

            <label>Comprimento (mm)</label>
            <input type="text" id="edit_comprimento">

            <label>Acabamento</label>
            <input type="text" id="edit_acabamento">

            <label>Peso Líquido (kg)</label>
            <input type="text" id="edit_peso_liquido">

            <label>Peso Bruto (kg)</label>
            <input type="text" id="edit_peso_bruto">

            <label>Preço de Custo</label>
            <input type="text" id="edit_preco_custo">

            <label>Preço de Venda</label>
            <input type="text" id="edit_preco_venda">

            <div id="mensagemEditar" class="msg-erro" style="display:none;"></div>

            <div class="modal-footer">
                <button type="button" id="btnCancelarModal" class="btn-cancelar">Cancelar</button>
                <button type="submit" class="btn-salvar-edit">Salvar</button>
            </div>
        </form>
    </div>
</div>

<script type="module" src="./js/produtos.js"></script>

</body>
</html>
