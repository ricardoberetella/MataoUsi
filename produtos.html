<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #ffffff;
      --primary: #38bdf8;
      --primary-dark: #0ea5e9;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 15px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
    }

    h2 {
      text-align: center;
      color: var(--primary);
      margin-bottom: 20px;
      font-size: 26px;
    }

    /* Inputs */
    input,
    select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      background: #0f172a;
      color: #fff;
    }

    /* Botões */
    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      cursor: pointer;
      color: #0f172a;
      font-weight: bold;
      font-size: 16px;
      margin-top: 10px;
      transition: 0.2s;
    }

    button:hover {
      background: var(--primary-dark);
    }

    #btnCancelar {
      background: #f87171;
      color: #fff;
      display: none;
    }

    #btnCancelar:hover {
      background: #ef4444;
    }

    /* Botão voltar */
    .btn-voltar {
      background: #64748b;
      color: white;
      margin-bottom: 15px;
    }

    .btn-voltar:hover {
      background: #475569;
    }

    /* Tabela */
    .tabela-wrapper {
      overflow-x: auto;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
      background: var(--bg);
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
      font-size: 15px;
    }

    th {
      background: var(--card);
    }

    /* Botões da tabela */
    .acoes button {
      padding: 8px 12px;
      font-size: 14px;
    }

    /* Responsividade */
    @media (max-width: 600px) {
      h2 {
        font-size: 22px;
      }
      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <button class="btn-voltar" onclick="window.location.href='dashboard.html'">⬅ Voltar ao Menu</button>

    <h2>Cadastro de Produtos</h2>

    <form id="formProduto">

      <input type="text" id="codigo" placeholder="Código do Produto">
      <input type="text" id="descricao" placeholder="Descrição">
      <input type="text" id="unidade" placeholder="Unidade (ex: UN, KG)">
      <input type="number" id="comprimento_mm" placeholder="Comprimento (mm)">

      <select id="acabamento">
        <option value="">Selecione o Acabamento</option>
        <option value="Zincado">Zincado</option>
        <option value="Tratado">Tratado</option>
      </select>

      <input type="text" id="peso_bruto" placeholder="Peso Bruto">
      <input type="text" id="peso_liquido" placeholder="Peso Líquido">
      <input type="text" id="preco_custo" placeholder="Preço de Custo">
      <input type="text" id="preco_venda" placeholder="Preço de Venda">

      <button id="btnSalvar" type="submit">Cadastrar Produto</button>
      <button id="btnCancelar" type="button">Cancelar</button>
    </form>

    <div class="tabela-wrapper">
      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Descrição</th>
            <th>Unidade</th>
            <th>Comp. (mm)</th>
            <th>Acabamento</th>
            <th>Peso Bruto</th>
            <th>Peso Líquido</th>
            <th>Preço Custo</th>
            <th>Preço Venda</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody id="listaProdutos"></tbody>
      </table>
    </div>

  </div>

  <script type="module" src="js/produtos.js"></script>

</body>

</html>
