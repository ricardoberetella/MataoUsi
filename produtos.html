<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 0, 0, .5);
    }

    h2 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 20px;
    }

    .grid-form {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-gap: 10px 15px;
    }

    input,
    select {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: none;
      outline: none;
      box-sizing: border-box;
    }

    label {
      font-size: 0.85rem;
      color: #cbd5f5;
      display: block;
      margin-bottom: 3px;
    }

    .botoes {
      margin-top: 15px;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      cursor: pointer;
      color: #0f172a;
      font-weight: bold;
      margin-right: 10px;
    }

    button#btnCancelar {
      background: #64748b;
      color: white;
    }

    table {
      width: 100%;
      margin-top: 25px;
      border-collapse: collapse;
      background: #0f172a;
      color: white;
      font-size: 0.9rem;
    }

    th,
    td {
      padding: 8px;
      border-bottom: 1px solid #1e293b;
      text-align: left;
      white-space: nowrap;
    }

    th {
      background: #020617;
    }

    .actions button {
      margin-right: 5px;
      padding: 6px 10px;
      font-size: 0.8rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Cadastro de Produtos</h2>

    <form id="formProduto">
      <div class="grid-form">
        <div>
          <label for="codigo">Código</label>
          <input type="text" id="codigo" placeholder="Ex: PARAF-08X30">
        </div>

        <div>
          <label for="descricao">Descrição</label>
          <input type="text" id="descricao" placeholder="Descrição do produto">
        </div>

        <div>
          <label for="unidade">Unidade</label>
          <input type="text" id="unidade" placeholder="Ex: PC, KG, M">
        </div>

        <div>
          <label for="comprimento_mm">Comprimento (mm)</label>
          <input type="text" id="comprimento_mm" placeholder="Ex: 30">
        </div>

        <div>
          <label for="acabamento">Acabamento</label>
          <select id="acabamento">
            <option value="">Selecione</option>
            <option value="Zincado">Zincado</option>
            <option value="Tratado">Tratado</option>
          </select>
        </div>

        <div>
          <label for="peso_bruto">Peso Bruto (kg)</label>
          <input type="text" id="peso_bruto" placeholder="Ex: 0,150">
        </div>

        <div>
          <label for="peso_liquido">Peso Líquido (kg)</label>
          <input type="text" id="peso_liquido" placeholder="Ex: 0,120">
        </div>

        <div>
          <label for="preco_custo">Preço Custo (R$)</label>
          <input type="text" id="preco_custo" placeholder="Ex: 2,50">
        </div>

        <div>
          <label for="preco_venda">Preço Venda (R$)</label>
          <input type="text" id="preco_venda" placeholder="Ex: 4,90">
        </div>
      </div>

      <div class="botoes">
        <button id="btnSalvar" type="submit">Cadastrar Produto</button>
        <button id="btnCancelar" type="button" style="display:none;">Cancelar</button>
      </div>
    </form>

    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Descrição</th>
          <th>Unidade</th>
          <th>Comp. (mm)</th>
          <th>Acabamento</th>
          <th>Peso Bruto</th>
          <th>Peso Líquido</th>
          <th>Preço Custo</th>
          <th>Preço Venda</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="listaProdutos"></tbody>
    </table>
  </div>

  <!-- Caminho certo para seu JS -->
  <script type="module" src="js/produtos.js"></script>
</body>

</html>
