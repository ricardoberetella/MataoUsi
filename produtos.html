<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.6);
    }

    h1 {
      text-align: left;
      color: #38bdf8;
      margin-bottom: 10px;
    }

    .btn-voltar {
      margin-left: auto;
      display: block;
      width: fit-content;
      margin-bottom: 20px;
      background: transparent;
      padding: 8px 18px;
      border-radius: 25px;
      border: 2px solid #38bdf8;
      color: #38bdf8;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .btn-voltar:hover {
      background: #38bdf8;
      color: black;
    }

    .form-row {
      display: flex;
      gap: 15px;
      margin-bottom: 10px;
    }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    input, select {
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: #e2e8f0;
      font-size: 15px;
    }

    .btn-salvar {
      width: 180px;
      background: #22c55e;
      padding: 12px;
      border-radius: 25px;
      border: none;
      font-size: 16px;
      color: black;
      cursor: pointer;
      margin-top: 20px;
      float: right;
    }

    .btn-salvar:hover {
      background: #16a34a;
    }

    table {
      width: 100%;
      border-spacing: 0;
      margin-top: 25px;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    th {
      background: #0f172a;
    }

    tr:nth-child(even) {
      background: #243244;
    }

    .edit-btn, .delete-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .edit-btn {
      background: #3b82f6;
    }

    .delete-btn {
      background: #ef4444;
    }

    /* MODAL DE EDIÇÃO */
    .edit-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 600px;
      transform: translate(-50%, -50%);
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.7);
      display: none;
      z-index: 999;
    }

    .edit-modal h2 {
      margin-top: 0;
      color: #38bdf8;
    }

    .modal-buttons {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
    }

    .cancel-btn {
      background: gray;
      padding: 10px 15px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      color: white;
    }

    .save-edit-btn {
      background: #22c55e;
      padding: 10px 15px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    /* ====================== RESPONSIVIDADE ========================== */

    @media (max-width: 900px) {

      .container {
        padding: 15px;
      }

      .form-row {
        flex-direction: column;
        gap: 8px;
      }

      .btn-salvar {
        width: 100%;
        float: none;
      }

      table {
        font-size: 12px;
      }

      .edit-modal {
        width: 95% !important;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px;
      }

      .modal-buttons {
        flex-direction: column;
        gap: 10px;
      }

      .modal-buttons button {
        width: 100%;
      }
    }
  </style>

</head>
<body>

  <div class="container">

    <a href="/painel.html" class="btn-voltar">← Voltar ao painel</a>

    <h1>Cadastro de Produtos</h1>
    <p>Gerencie os produtos cadastrados no sistema.</p>

    <hr><br>

    <!-- FORMULÁRIO -->
    <div class="form">

      <div class="form-row">
        <div class="form-group">
          <label>Código</label>
          <input type="text" id="codigo">
        </div>

        <div class="form-group">
          <label>Descrição</label>
          <input type="text" id="descricao">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Unidade</label>
          <input type="text" id="unidade">
        </div>

        <div class="form-group">
          <label>Comprimento (mm)</label>
          <input type="text" id="comprimento_mm">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Acabamento</label>
          <input type="text" id="acabamento">
        </div>

        <div class="form-group">
          <label>Peso Líquido (kg)</label>
          <input type="text" id="peso_liquido">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Peso Bruto (kg)</label>
          <input type="text" id="peso_bruto">
        </div>

        <div class="form-group">
          <label>Preço de Custo (R$)</label>
          <input type="text" id="preco_custo">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group" style="flex: 1;">
          <label>Preço de Venda (R$)</label>
          <input type="text" id="preco_venda">
        </div>
      </div>

      <button class="btn-salvar" id="btnSalvar">Salvar produto</button>

      <p id="mensagem" style="color: #ff6b6b; margin-top: 10px;"></p>
    </div>

    <br><br>
    <h2>Produtos cadastrados</h2>

    <label>Buscar por código:</label>
    <input type="text" id="buscarCodigo" placeholder="Digite o código para filtrar" style="width: 260px; margin-bottom: 20px;">

    <!-- TABELA -->
    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Descrição</th>
          <th>Unidade</th>
          <th>Comprimento (mm)</th>
          <th>Acabamento</th>
          <th>Peso Líquido (kg)</th>
          <th>Peso Bruto (kg)</th>
          <th>Preço de Custo</th>
          <th>Preço de Venda</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="listaProdutos"></tbody>
    </table>

  </div>

  <!-- MODAL DE EDIÇÃO -->
  <div class="edit-modal" id="editModal">
    <h2>Editar produto</h2>

    <div id="editFields"></div>

    <div class="modal-buttons">
      <button class="cancel-btn" onclick="fecharEdicao()">Cancelar</button>
      <button class="save-edit-btn" onclick="salvarEdicao()">Salvar</button>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/produtos.js"></script>

</body>
</html>
