<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 0, 0, .5);
    }

    h2 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 25px;
      background: #0f172a;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #1e293b;
      text-align: left;
    }

    th {
      color: #38bdf8;
    }

    .actions button {
      padding: 6px 12px;
      margin-right: 5px;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Cadastro de Produtos</h2>

    <form id="formProduto">

      <input type="text" id="codigo" placeholder="Código do Produto" required>
      <input type="text" id="descricao" placeholder="Descrição" required>
      <input type="text" id="unidade" placeholder="Unidade (ex: UN, KG)" required>

      <input type="number" id="comprimento_mm" placeholder="Comprimento (mm)">

      <select id="acabamento">
        <option value="">Selecione o Acabamento</option>
        <option value="Zincado">Zincado</option>
        <option value="Tratado">Tratado</option>
      </select>

      <input type="text" id="peso_bruto" placeholder="Peso Bruto (kg)">
      <input type="text" id="peso_liquido" placeholder="Peso Líquido (kg)">
      <input type="text" id="preco_custo" placeholder="Preço de Custo (R$)">
      <input type="text" id="preco_venda" placeholder="Preço de Venda (R$)">

      <button id="btnSalvar" type="submit">Cadastrar Produto</button>
      <button id="btnCancelar" type="button" style="display:none;">Cancelar Edição</button>

    </form>

    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Descrição</th>
          <th>Unidade</th>
          <th>Comprimento (mm)</th>
          <th>Acabamento</th>
          <th>Peso Bruto</th>
          <th>Peso Líquido</th>
          <th>Preço Custo</th>
          <th>Preço Venda</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="listaProdutos"></tbody>
    </table>
  </div>

  <!-- Caminho correto -->
  <script type="module" src="js/produtos.js"></script>

</body>

</html>
