<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar Produto - MataoUsi</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 450px;
      margin: auto;
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #38bdf8;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      background: #475569;
      color: white;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
    }

    button:hover {
      background: #0ea5e9;
    }

    .back-btn {
      background: #64748b;
    }

    .back-btn:hover {
      background: #475569;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- BOTÃO VOLTAR -->
    <button class="back-btn" onclick="window.location.href='dashboard.html'">
      ← Voltar ao Dashboard
    </button>

    <h2>Cadastrar Produto</h2>

    <input type="text" id="codigo" placeholder="Código do Produto (SKU)">
    <input type="text" id="descricao" placeholder="Descrição">
    <input type="text" id="unidade" placeholder="Unidade (ex: Pç)">
    <input type="number" step="0.001" id="peso" placeholder="Peso (KG)">
    <input type="number" step="0.01" id="preco_custo" placeholder="Preço de Custo">
    <input type="number" step="0.01" id="preco_venda" placeholder="Preço de Venda">

    <select id="acabamento">
      <option value="Zincado">Zincado</option>
      <option value="Tratado">Tratado</option>
      <option value="Natural">Natural</option>
    </select>

    <input type="number" id="comprimento" placeholder="Comprimento (mm)">

    <button onclick="cadastrarProduto()">Cadastrar Produto</button>
  </div>

  <script type="module" src="./js/produtos.js"></script>

</body>
</html>
