<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Produto</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      background: #334155;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0ea5e9;
    }

    .btn-voltar {
      background: #64748b;
    }

    .btn-voltar:hover {
      background: #475569;
    }
  </style>
</head>

<body>

<div class="container">

  <button class="btn-voltar" onclick="window.location.href='produtos.html'">
    ← Voltar
  </button>

  <h2>Cadastrar Produto</h2>

  <form id="formProduto">

    <input id="codigo" placeholder="Código (SKU)" required>

    <input id="descricao" placeholder="Descrição" required>

    <input id="unidade" placeholder="Unidade (ex: Pc)" required>

    <input id="peso" placeholder="Peso (KG)" type="number" step="0.001" required>

    <input id="preco_custo" placeholder="Preço de Custo" type="number" step="0.01" required>

    <input id="preco_venda" placeholder="Preço de Venda" type="number" step="0.01" required>

    <input id="acabamento" placeholder="Zincado / Tratado / Outro" required>

    <input id="comprimento" placeholder="Comprimento (mm)" type="number" required>

    <button type="submit">Cadastrar Produto</button>
  </form>

</div>

<script type="module" src="./js/produtos_cadastrar.js"></script>

</body>
</html>
