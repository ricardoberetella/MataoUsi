<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #38bdf8;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 2px solid #334155;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #38bdf8;
      font-size: 22px;
    }

    /* FORM MOBILE FIRST */
    form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 0, 0, .5);
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #334155;
      color: white;
      font-size: 16px;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      cursor: pointer;
      color: #0f172a;
      font-weight: bold;
      font-size: 16px;
      width: 100%;
    }

    .btnSec {
      background: #64748b;
      color: white;
    }

    /* TABELA */
    .tabela-container {
      margin-top: 25px;
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid #334155;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
      color: white;
      min-width: 900px; /* força mobile a rolar */
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      background: #0f172a;
      color: #38bdf8;
    }

    .acoes button {
      width: auto;
      padding: 6px 10px;
      margin: 2px;
      font-size: 14px;
    }

    /* BOTÃO VOLTAR */
    .back-btn {
      display: block;
      margin-bottom: 15px;
      background: #38bdf8;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      color: #0f172a;
      text-decoration: none;
      font-weight: bold;
    }

    /* RESPONSIVIDADE */
    @media (min-width: 700px) {
      form {
        grid-template-columns: repeat(2, 1fr);
      }

      form button {
        grid-column: span 2;
      }
    }
  </style>
</head>

<body>

<header>Cadastro de Produtos</header>

<div class="container">

  <a href="dashboard.html" class="back-btn">⬅ Voltar ao Menu</a>

  <h2>Informações do Produto</h2>

  <form id="formProduto">

    <input type="text" id="codigo" placeholder="Código do Produto">
    <input type="text" id="descricao" placeholder="Descrição">
    <input type="text" id="unidade" placeholder="Unidade (ex: UN, KG)">
    <input type="number" id="comprimento_mm" placeholder="Comprimento (mm)">

    <select id="acabamento">
      <option value="">Selecione o Acabamento</option>
      <option value="Zincado">Zincado</option>
      <option value="Tratado">Tratado</option>
    </select>

    <input type="text" id="peso_bruto" placeholder="Peso Bruto">
    <input type="text" id="peso_liquido" placeholder="Peso Líquido">
    <input type="text" id="preco_custo" placeholder="Preço de Custo">
    <input type="text" id="preco_venda" placeholder="Preço de Venda">

    <button id="btnSalvar" type="submit">Cadastrar Produto</button>
    <button id="btnCancelar" type="button" class="btnSec" style="display:none;">Cancelar</button>

  </form>

  <div class="tabela-container">
    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Descrição</th>
          <th>Unidade</th>
          <th>Comp. (mm)</th>
          <th>Acabamento</th>
          <th>Peso Bruto</th>
          <th>Peso Líquido</th>
          <th>Preço Custo</th>
          <th>Preço Venda</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="listaProdutos"></tbody>
    </table>
  </div>

</div>

<script type="module" src="js/produtos.js"></script>

</body>

</html>
