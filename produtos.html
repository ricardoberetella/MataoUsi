<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/produtos.css">
</head>

<body>

  <!-- Topbar -->
  <header class="topbar">
    <button onclick="window.location.href='dashboard.html'" class="voltar">⬅ Voltar</button>
    <h1>Produtos</h1>
  </header>

  <div class="container">

    <!-- Formulário -->
    <form id="formProduto" class="card">
      <h2>Cadastrar / Editar Produto</h2>

      <div class="grid">

        <!-- Código + Buscar -->
        <div class="linha-codigo">
          <input type="text" id="codigo" placeholder="Código (SKU)">
          <button type="button" id="btnBuscarCodigo" class="btn-buscar">Buscar</button>
        </div>

        <input type="text" id="descricao" placeholder="Descrição">
        <input type="text" id="unidade" placeholder="Unidade (UN, KG...)">

        <input type="text" id="comprimento_mm" placeholder="Comprimento (mm)">

        <select id="acabamento">
          <option value="">Acabamento</option>
          <option value="Zincado">Zincado</option>
          <option value="Tratado">Tratado</option>
        </select>

        <input type="text" id="peso_bruto" placeholder="Peso Bruto">
        <input type="text" id="peso_liquido" placeholder="Peso Líquido">
        <input type="text" id="preco_custo" placeholder="Preço de Custo">
        <input type="text" id="preco_venda" placeholder="Preço de Venda">

      </div>

      <div class="btn-area">
        <button id="btnSalvar" type="submit" class="btn-primary">Salvar</button>
        <button id="btnCancelar" type="button" class="btn-secondary" style="display:none;">Cancelar</button>
      </div>
    </form>

    <!-- Lista -->
    <div class="card">
      <h2>Lista de Produtos</h2>

      <!-- FILTROS -->
      <div class="filtros">
        <input type="text" id="filtroCodigo" placeholder="Filtrar por código">
        <input type="text" id="filtroDescricao" placeholder="Filtrar por descrição" list="sugestoesDescricao">
        <select id="filtroUnidade">
          <option value="">Todas as unidades</option>
          <option value="UN">UN</option>
          <option value="KG">KG</option>
          <option value="PC">PC</option>
        </select>
        <button type="button" id="btnAplicarFiltros" class="btn-primary btn-sm">Filtrar</button>
        <button type="button" id="btnLimparFiltros" class="btn-secondary btn-sm">Limpar</button>
      </div>

      <!-- AUTOCOMPLETE DESCRIÇÃO -->
      <datalist id="sugestoesDescricao"></datalist>

      <!-- EXPORTAÇÃO -->
      <div class="export-area">
        <button type="button" id="btnExportarExcel" class="btn-secondary btn-sm">Exportar Excel</button>
        <button type="button" id="btnExportarPDF" class="btn-secondary btn-sm">Exportar PDF</button>
      </div>

      <!-- TABELA -->
      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>Cód</th>
              <th>Descrição</th>
              <th>UN</th>
              <th>Comp</th>
              <th>Acab</th>
              <th>P. Bruto</th>
              <th>P. Líquido</th>
              <th>Custo</th>
              <th>Venda</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="listaProdutos"></tbody>
        </table>
      </div>

      <!-- PAGINAÇÃO -->
      <div class="paginacao">
        <button type="button" id="btnAnterior" class="btn-secondary btn-sm">◀</button>
        <span id="infoPagina">Página 1 de 1 (0 itens)</span>
        <button type="button" id="btnProximo" class="btn-secondary btn-sm">▶</button>
      </div>

    </div>

  </div>

  <!-- JS -->
  <script type="module" src="js/produtos.js"></script>
</body>
</html>
