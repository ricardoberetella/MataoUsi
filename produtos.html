<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos - MataoUsi</title>

  <link rel="stylesheet" href="css/produtos.css">

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./js/config.js";

    window.supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>
</head>

<body>

  <h2>Produtos</h2>

  <!-- BOTÃO FUTURISTA VOLTAR AO MENU -->
  <div style="text-align:right; margin: 10px 30px;">
    <button onclick="location.href='dashboard.html'"
      style="
        background: #38bdf8;
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        font-size: 15px;
        color: #000;
        box-shadow: 0 0 12px rgba(56,189,248,0.8);
        transition: 0.3s;
      "
      onmouseover="this.style.boxShadow='0 0 20px rgba(56,189,248,1)'"
      onmouseout="this.style.boxShadow='0 0 12px rgba(56,189,248,0.8)'"
    >
      ⬅ Voltar ao Menu
    </button>
  </div>

  <div class="container">

    <!-- ABAS -->
    <div class="tabs">
      <button class="tab active" data-tab="cadastro">Cadastrar Produto</button>
      <button class="tab" data-tab="lista">Listar Produtos</button>
    </div>

    <!-- CADASTRO -->
    <div id="cadastro" class="tab-content active">
      <form id="formProduto">
        <input type="hidden" id="produtoId">

        <label>Código</label>
        <input type="text" id="codigo" required>

        <label>Descrição</label>
        <input type="text" id="descricao" required>

        <label>Unidade</label>
        <input type="text" id="unidade">

        <label>Comprimento (mm)</label>
        <input type="number" id="comprimento_mm">

        <label>Acabamento (Zincado/Tratado)</label>
        <select id="acabamento">
          <option value=""></option>
          <option value="Zincado">Zincado</option>
          <option value="Tratado">Tratado</option>
        </select>

        <label>Peso Bruto (kg)</label>
        <input type="text" id="peso_bruto">

        <label>Peso Líquido (kg)</label>
        <input type="text" id="peso_liquido">

        <label>Preço de Custo (R$)</label>
        <input type="text" id="preco_custo">

        <label>Preço de Venda (R$)</label>
        <input type="text" id="preco_venda">

        <div class="btns">
          <button type="submit" id="btnSalvar">Salvar</button>
          <button type="button" id="btnCancelar">Cancelar</button>
        </div>
      </form>
    </div>

    <!-- LISTA -->
    <div id="lista" class="tab-content">
      <input type="text" id="busca" placeholder="Buscar por código, descrição ou unidade">

      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Descrição</th>
            <th>Unidade</th>
            <th>Acabamento</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaProdutos"></tbody>
      </table>
    </div>

  </div>

  <script type="module" src="js/produtos.js"></script>

</body>
</html>
