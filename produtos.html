<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos - MataoUsi</title>

  <script type="module" src="./js/produtos.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table th, table td {
      border: 1px solid #334155;
      padding: 10px;
      text-align: left;
    }

    table th {
      background: #1e293b;
    }

    input {
      padding: 8px;
      border: none;
      border-radius: 6px;
      width: 250px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .btn-red {
      background: #ef4444;
    }

    .btn-red:hover {
      background: #dc2626;
    }
  </style>
</head>

<body>

<header>
  <h2>📦 Produtos</h2>
  <button onclick="window.location.href='painel.html'">Voltar ao Painel</button>
</header>

<div class="container">

  <button onclick="window.location.href='produtos_cadastrar.html'">+ Cadastrar Produto</button>

  <br><br>

  <input type="text" id="buscar" placeholder="Buscar produto...">

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Descrição</th>
        <th>Unidade</th>
        <th>Peso</th>
        <th>Venda</th>
        <th>Acabamento</th>
        <th>Comprimento</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="lista-produtos"></tbody>
  </table>

</div>

</body>
</html>
