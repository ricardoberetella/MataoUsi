<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cadastro de Produtos</title>

  <style>
    body {
      background: #0f172a;
      color: #fff;
      margin: 0;
      font-family: "Arial";
    }

    header {
      background: #1e293b;
      padding: 15px 20px;
      text-align: center;
      color: #38bdf8;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #38bdf8;
    }

    form input,
    form select {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    .btn-area {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      padding: 14px;
      border: none;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      flex: 1;
    }

    #btnSalvar {
      background: #38bdf8;
      color: #0f172a;
    }

    #btnCancelar {
      background: #ef4444;
      color: white;
    }

    #btnVoltar {
      background: #22c55e;
      color: #0f172a;
      width: 100%;
      margin-bottom: 20px;
    }

    /* TABELA RESPONSIVA */
    .tabela-wrapper {
      overflow-x: auto;
      margin-top: 25px;
      border-radius: 10px;
      border: 1px solid #334155;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th {
      background: #1e293b;
      padding: 12px;
      text-align: left;
      color: #38bdf8;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #334155;
    }

    .acoes button {
      background: #38bdf8;
      color: #0f172a;
      padding: 10px;
      font-size: 14px;
      margin-right: 5px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* MOBILE FIRST */
    @media (max-width: 600px) {
      h2 {
        font-size: 20px;
      }

      button {
        font-size: 15px;
      }

      table {
        min-width: 700px;
      }
    }
  </style>
</head>

<body>

  <header>Cadastro de Produtos</header>

  <div class="container">

    <!-- BOTÃO VOLTAR AO MENU -->
    <button id="btnVoltar" onclick="window.location.href='dashboard.html'">⬅ Voltar ao Menu</button>

    <h2>Ficha do Produto</h2>

    <form id="formProduto">
      <input type="text" id="codigo" placeholder="Código do Produto">
      <input type="text" id="descricao" placeholder="Descrição">
      <input type="text" id="unidade" placeholder="Unidade (ex: UN, KG)">
      <input type="number" id="comprimento_mm" placeholder="Comprimento (mm)">
      
      <select id="acabamento">
        <option value="">Acabamento</option>
        <option value="Zincado">Zincado</option>
        <option value="Tratado">Tratado</option>
      </select>

      <input type="text" id="peso_bruto" placeholder="Peso Bruto">
      <input type="text" id="peso_liquido" placeholder="Peso Líquido">
      <input type="text" id="preco_custo" placeholder="Preço de Custo">
      <input type="text" id="preco_venda" placeholder="Preço de Venda">

      <div class="btn-area">
        <button id="btnSalvar" type="submit">Cadastrar Produto</button>
        <button id="btnCancelar" type="button" style="display:none;">Cancelar</button>
      </div>
    </form>

    <!-- TABELA RESPONSIVA -->
    <div class="tabela-wrapper">
      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Descrição</th>
            <th>Unidade</th>
            <th>Comp. (mm)</th>
            <th>Acabamento</th>
            <th>Peso Bruto</th>
            <th>Peso Líquido</th>
            <th>Preço Custo</th>
            <th>Preço Venda</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody id="listaProdutos"></tbody>
      </table>
    </div>

  </div>

  <script type="module" src="js/produtos.js"></script>

</body>

</html>
