<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 0, 0, .5);
    }

    h2 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      cursor: pointer;
      color: #0f172a;
      font-weight: bold;
      margin-right: 10px;
      margin-top: 10px;
    }

    .btn-voltar {
      background: #f8fafc;
      color: #0f172a;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      margin-top: 30px;
      border-collapse: collapse;
      background: #0f172a;
      color: white;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      background: #1e293b;
    }

    .acoes button {
      margin-right: 5px;
      background: #38bdf8;
      color: #0f172a;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- BOTÃO DE VOLTAR AO MENU -->
    <button class="btn-voltar" onclick="window.location.href='dashboard.html'">
      ⬅ Voltar ao Menu
    </button>

    <h2>Cadastro de Produtos</h2>

    <form id="formProduto">

      <input type="text" id="codigo" placeholder="Código do Produto">
      <input type="text" id="descricao" placeholder="Descrição">
      <input type="text" id="unidade" placeholder="Unidade (ex: UN, KG)">
      <input type="number" id="comprimento_mm" placeholder="Comprimento (mm)">

      <select id="acabamento">
        <option value="">Selecione o Acabamento</option>
        <option value="Zincado">Zincado</option>
        <option value="Tratado">Tratado</option>
      </select>

      <input type="text" id="peso_bruto" placeholder="Peso Bruto">
      <input type="text" id="peso_liquido" placeholder="Peso Líquido">
      <input type="text" id="preco_custo" placeholder="Preço de Custo">
      <input type="text" id="preco_venda" placeholder="Preço de Venda">

      <button id="btnSalvar" type="submit">Cadastrar Produto</button>
      <button id="btnCancelar" type="button" style="display:none;">Cancelar</button>

    </form>

    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Descrição</th>
          <th>Unidade</th>
          <th>Comp. (mm)</th>
          <th>Acabamento</th>
          <th>Peso Bruto</th>
          <th>Peso Líquido</th>
          <th>Preço Custo</th>
          <th>Preço Venda</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="listaProdutos"></tbody>
    </table>

  </div>

  <script type="module" src="js/produtos.js"></script>

</body>

</html>
