<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Produtos</title>

    <link rel="stylesheet" href="dashboard.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            margin: 0;
            padding: 0;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: left;
            color: #38bdf8;
            margin-bottom: 20px;
        }

        .btn-voltar {
            background: transparent;
            color: #fff;
            border: 2px solid #38bdf8;
            padding: 10px 22px;
            border-radius: 20px;
            cursor: pointer;
            float: right;
            margin-bottom: 20px;
            position: relative;
            right: -10px; /* aproximar 10mm para dentro */
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #e2e8f0;
            font-size: 1rem;
            color: #000;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 3px;
            display: block;
        }

        .btn-salvar {
            background: #10b981;
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 22px;
            cursor: pointer;
            float: right;
            margin-top: 10px;
            font-size: 1rem;
        }

        .msg-erro {
            color: #f87171;
            margin-top: 8px;
        }

        .msg-sucesso {
            color: #4ade80;
            margin-top: 8px;
        }

        /* Tabela */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        th {
            background: #0f172a;
        }

        tr:nth-child(even) {
            background: #334155;
        }

        .col-acoes {
            display: flex;
            gap: 10px;
        }

        .btn-acao {
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            border: none;
            color: #fff;
        }

        .btn-editar {
            background: #3b82f6;
        }

        .btn-excluir {
            background: #ef4444;
        }

        /* Modal */
        #modalEditar.hidden {
            display: none;
        }

        #modalEditar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 500px;
        }

        .modal-footer {
            text-align: right;
            margin-top: 10px;
        }

        .btn-cancelar {
            background: #ef4444;
            padding: 8px 15px;
            border:none;
            color: #fff;
            border-radius:6px;
            cursor:pointer;
        }

        .btn-salvar-edit {
            background: #10b981;
            padding: 8px 15px;
            border:none;
            color:#fff;
            border-radius:6px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <button class="btn-voltar" onclick="window.location.href='painel.html'">
        ← Voltar ao painel
    </button>

    <h1>Cadastro de Produtos</h1>

    <h3> Novo produto </h3>

    <form id="produtoForm">

        <div class="form-grid">
            <div>
                <label>Código</label>
                <input type="text" name="codigo" required />

                <label>Unidade</label>
                <input type="text" name="unidade" />

                <label>Acabamento</label>
                <input type="text" name="acabamento" />

                <label>Peso Bruto (kg)</label>
                <input type="text" name="peso_bruto" />
            </div>

            <div>
                <label>Descrição</label>
                <input type="text" name="descricao" required />

                <label>Comprimento (mm)</label>
                <input type="text" name="comprimento" />

                <label>Peso Líquido (kg)</label>
                <input type="text" name="peso_liquido" />

                <label>Preço de Custo (R$)</label>
                <input type="text" name="preco_custo" />
            </div>
        </div>

        <label>Preço de Venda (R$)</label>
        <input type="text" name="preco_venda" style="width: 40%;" />

        <div id="mensagemForm" class="msg-erro" style="display:none;"></div>

        <br>
        <button type="submit" class="btn-salvar">Salvar produto</button>
    </form>

    <h3 style="margin-top:40px;"> Produtos cadastrados </h3>

    <label>Buscar por código:</label>
    <input type="text" id="buscaCodigo" placeholder="Digite o código para filtrar" style="width: 250px;">

    <table id="tabelaProdutos">
        <thead>
        <tr>
            <th>Código</th>
            <th>Descrição</th>
            <th>Unidade</th>
            <th>Comprimento (mm)</th>
            <th>Acabamento</th>
            <th>Peso Líquido (kg)</th>
            <th>Peso Bruto (kg)</th>
            <th>Preço de Custo</th>
            <th>Preço de Venda</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr><td colspan="10">Carregando...</td></tr>
        </tbody>
    </table>

</div>


<!-- MODAL EDITAR -->
<div id="modalEditar" class="hidden">
    <div class="modal-content">
        <h3>Editar Produto</h3>

        <form id="formEditar">

            <input type="hidden" id="edit_id">

            <label>Código</label>
            <input type="text" id="edit_codigo">

            <label>Descrição</label>
            <input type="text" id="edit_descricao">

            <label>Unidade</label>
            <input type="text" id="edit_unidade">

            <label>Comprimento (mm)</label>
            <input type="text" id="edit_comprimento">

            <label>Acabamento</label>
            <input type="text" id="edit_acabamento">

            <label>Peso Líquido (kg)</label>
            <input type="text" id="edit_peso_liquido">

            <label>Peso Bruto (kg)</label>
            <input type="text" id="edit_peso_bruto">

            <label>Preço de Custo (R$)</label>
            <input type="text" id="edit_preco_custo">

            <label>Preço de Venda (R$)</label>
            <input type="text" id="edit_preco_venda">

            <div id="mensagemEditar" class="msg-erro" style="display:none;"></div>

            <div class="modal-footer">
                <button type="button" id="btnCancelarModal" class="btn-cancelar">Cancelar</button>
                <button type="submit" class="btn-salvar-edit">Salvar</button>
            </div>
        </form>
    </div>
</div>

<!-- SCRIPT CORRETO! -->
<script type="module" src="./js/produtos.js"></script>

</body>
</html>
