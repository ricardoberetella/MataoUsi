<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar Senha</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1b2b;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #27a8ff;
      color: white;
      cursor: pointer;
    }

    .msg {
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }

    .success { background: #2ecc71; }
    .error { background: #e74c3c; }
  </style>
</head>
<body>

<div class="container">
  <h2>Recuperar Senha</h2>

  <input type="email" id="email" placeholder="Digite seu e-mail">

  <button id="btnRecuperar">Enviar link de recuperação</button>

  <div id="msg"></div>

  <p><a href="index.html" style="color:#73c3ff">Voltar ao login</a></p>
</div>

<!-- CAMINHO CORRETO! -->
<script type="module" src="./js/recover.js"></script>

</body>
</html>
