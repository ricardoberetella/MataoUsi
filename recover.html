<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha - MataoUsi</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      width: 340px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #38bdf8;
      font-size: 24px;
    }

    label { margin-bottom: 6px; display: block; color: #e2e8f0; }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      margin-bottom: 15px;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      font-weight: bold;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover { background: #0ea5e9; }

    .msg {
      display: none;
      padding: 10px;
      text-align: center;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .error { background: #dc2626; }
    .success { background: #16a34a; }

    a {
      display: block;
      text-align: center;
      margin-top: 12px;
      color: #38bdf8;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

  </style>
</head>
<body>

  <div class="login-container">

    <h1>Recuperar Senha</h1>

    <div id="msg" class="msg"></div>

    <label>Digite seu e-mail:</label>
    <input type="email" id="email" placeholder="exemplo@email.com">

    <button id="btnRecuperar">Enviar link de recuperação</button>

    <a href="index.html">Voltar ao login</a>

  </div>

  <script type="module" src="recover.js"></script>

</body>
</html>
