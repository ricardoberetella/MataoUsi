<div class="container">
    <div class="resumo-financeiro" id="cardsBancos">
        </div>

    <section class="card">
        <h2 class="card-title">Ações de Caixa</h2>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button id="btnNovoPagar" class="btn-primario" style="background: #f87171;">- Agendar Conta (Saída)</button>
            <button id="btnReceitaManual" class="btn-primario" style="background: #10b981;">+ Recebimento Manual (Entrada)</button>
            <button id="btnTransferir" class="btn-primario" style="background: #6366f1;">⇄ Transferir entre Bancos</button>
        </div>
        
        <div style="margin-top: 20px; display: flex; gap: 15px; align-items: flex-end;">
            <div class="form-group">
                <label>Filtrar Relatório (Mês)</label>
                <input type="month" id="filtroMes" class="input-dark" style="padding: 8px; background: #0f172a; color: white; border: 1px solid #334155;">
            </div>
        </div>
    </section>

    <section class="card">
        <h2 class="card-title">Relatório de Contas Agendadas</h2>
        <table class="tabela-futurista">
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Banco Destino</th>
                    <th>Vencimento</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaPagar"></tbody>
        </table>
    </section>
</div>

<script type="module" src="js/contas_pagar.js"></script>
