<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contas a Pagar - Matão Usinagem</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #38bdf8;
            --neon-green: #10b981;
            --neon-red: #f87171;
            --bg-dark: #0f172a;
        }

        /* Estilo do Modal Futurista */
        .modal-financeiro {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none; /* Oculto por padrão */
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: var(--bg-dark);
            border: 2px solid var(--neon-blue);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
        }

        .label-modal {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            display: block;
        }

        #cardsBancos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card-banco-futuro {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

<header class="topbar">
    <div class="topbar-content">
        <a href="dashboard.html"><button class="btn-voltar">← Voltar</button></a>
        <h1 class="topbar-title">CONTAS A PAGAR</h1>
        <div class="user-info">Matão Usinagem</div>
    </div>
</header>

<div class="container">
    <div id="cardsBancos"></div>

    <div class="top-actions" style="background: rgba(30, 41, 59, 0.5); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
        <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
            <div>
                <label class="label-modal">Status</label>
                <select id="filtroStatus" style="padding: 10px; border-radius: 8px; background: #1e293b; color: white; border: 1px solid #334155;">
                    <option value="Todos">Todos</option>
                    <option value="ABERTO">Aberto</option>
                    <option value="PAGO">Pago</option>
                </select>
            </div>
            <div>
                <label class="label-modal">Vencimento até</label>
                <input type="date" id="filtroDataAte" style="padding: 9px; border-radius: 8px; background: #1e293b; color: white; border: 1px solid #334155;">
            </div>
            <button id="btnFiltrar" class="btn-acao" style="background: #334155;">Filtrar</button>
            <button id="btnNovoPagar" class="btn-acao" style="background: var(--neon-blue);">+ Novo Lançamento</button>
            <button id="btnTransferir" class="btn-acao" style="background: #6366f1;">Transferências</button>
            <button id="btnGerarPDF" class="btn-acao" style="background: #94a3b8;">Gerar PDF</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Origem da Despesa</th>
                    <th>Banco</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaPagar"></tbody>
        </table>
    </div>
</div>

<div id="modalLancamento" class="modal-financeiro">
    <div class="modal-content">
        <h2 style="font-family: 'Orbitron', sans-serif; color: var(--neon-blue); margin-bottom: 20px; font-size: 1.2rem;">Novo Lançamento</h2>
        
        <label class="label-modal">Origem da Despesa</label>
        <input type="text" id="m_descricao" placeholder="Nome do fornecedor ou serviço">

        <label class="label-modal">Valor (R$)</label>
        <input type="text" id="m_valor" placeholder="0,00" oninput="validarMoeda(this)">

        <label class="label-modal">Data de Vencimento</label>
        <input type="date" id="m_data">

        <label class="label-modal">Banco para Débito</label>
        <select id="m_banco"></select>

        <div style="display: flex; gap: 10px;">
            <button id="btnSalvarModal" class="btn-acao" style="background: var(--neon-green); flex: 1;">Confirmar</button>
            <button id="btnFecharModal" class="btn-acao" style="background: var(--neon-red); flex: 1;">Cancelar</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script type="module" src="js/contas_pagar.js"></script>

<script>
    // Função global para fechar o modal
    window.fecharModal = () => {
        document.getElementById("modalLancamento").style.display = "none";
    };
    
    // Adiciona evento ao botão de fechar
    document.getElementById("btnFecharModal").addEventListener("click", fecharModal);
</script>

</body>
</html>
