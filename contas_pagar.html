<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contas a Pagar - Matão Usinagem</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pedidos_lista.css">
    <style>
        .resumo-financeiro { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .mini-card { flex: 1; min-width: 200px; padding: 15px; border-radius: 8px; background: #1e293b; border: 1px solid #334155; text-align: center; }
        .valor-caixa { color: #38bdf8; font-size: 1.5rem; font-weight: bold; }
        .valor-aberto { color: #f87171; font-size: 1.5rem; font-weight: bold; }
        .btn-pagar { background: #f87171 !important; color: #fff !important; padding: 5px 10px; border-radius: 4px; border:none; cursor:pointer; }
        .badge-pago { background: #059669; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .badge-aberto { background: #dc2626; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>
<header class="topbar">
    <a href="dashboard.html"><button class="btn-voltar">⬅ Voltar ao Menu</button></a>
    <h1 class="topbar-title">Contas a Pagar & Relatórios</h1>
</header>

<div class="container">
    <div class="resumo-financeiro">
        <div class="mini-card">
            <h3>Caixa Atual (Banco)</h3>
            <p id="caixaAtual" class="valor-caixa">R$ 0,00</p>
        </div>
        <div class="mini-card">
            <h3>Total a Pagar (Mês Selecionado)</h3>
            <p id="totalMes" class="valor-aberto">R$ 0,00</p>
        </div>
    </div>

    <section class="card">
        <h2 class="card-title">Filtros e Lançamentos</h2>
        <div style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">
            <button id="btnNovoPagar" class="btn-primario" style="background: #10b981;">+ Nova Conta</button>
            
            <div class="form-group">
                <label>Mês de Vencimento</label>
                <input type="month" id="filtroMes" style="padding: 8px; border-radius: 5px; background: #0f172a; color: white; border: 1px solid #334155;">
            </div>

            <div class="form-group">
                <label>Status</label>
                <select id="filtroStatus" style="padding: 8px; border-radius: 5px; background: #0f172a; color: white; border: 1px solid #334155;">
                    <option value="">Todos</option>
                    <option value="ABERTO">Em Aberto</option>
                    <option value="PAGO">Pago</option>
                </select>
            </div>
        </div>
    </section>

    <section class="card">
        <h2 class="card-title">Listagem Detalhada</h2>
        <table class="tabela-futurista">
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Vencimento</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaPagar"></tbody>
        </table>
    </section>
</div>

<script type="module" src="js/contas_pagar.js"></script>
</body>
</html>
