<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contas a Pagar - Matão Usinagem</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pedidos_lista.css">
    <style>
        .resumo-bancos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card-banco { background: #0f172a; padding: 20px; border-radius: 12px; border: 1px solid #1e293b; text-align: center; }
        .saldo-valor { font-size: 1.6rem; font-weight: bold; color: #38bdf8; margin-top: 8px; }
        .badge-pago { background: #059669; color: white; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-aberto { background: #dc2626; color: white; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .input-dark { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; margin-top: 5px; }
        .btn-acao { border: none; border-radius: 6px; padding: 10px 18px; color: white; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
<header class="topbar">
    <a href="dashboard.html"><button class="btn-voltar">← Voltar ao Menu</button></a>
    <h1 class="topbar-title">Contas a Pagar</h1>
</header>

<div class="container">
    <div class="resumo-bancos" id="cardsBancos"></div>

    <section class="card">
        <h2 class="card-title">Filtros</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
            <div class="form-group">
                <label>Status</label>
                <select id="filtroStatus" class="input-dark">
                    <option value="">Todos</option>
                    <option value="ABERTO">Em Aberto</option>
                    <option value="PAGO">Pago</option>
                </select>
            </div>
            <div class="form-group">
                <label>Vencimento até</label>
                <input type="date" id="filtroDataAte" class="input-dark">
            </div>
        </div>
        <div style="margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap;">
            <button id="btnFiltrar" class="btn-acao" style="background: #38bdf8;">Filtrar</button>
            <button id="btnNovoPagar" class="btn-acao" style="background: #10b981;">+ Lançamento Manual</button>
            <button id="btnTransferir" class="btn-acao" style="background: #6366f1;">⇄ Transferir Bancos</button>
            <button id="btnGerarPDF" class="btn-acao" style="background: #38bdf8;">Gerar PDF</button>
        </div>
    </section>

    <section class="card">
        <h2 class="card-title">Lançamentos Agendados</h2>
        <div style="overflow-x: auto;">
            <table class="tabela-futurista">
                <thead>
                    <tr>
                        <th>NF / Origem</th>
                        <th>Banco</th>
                        <th>Valor</th>
                        <th>Vencimento</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaPagar"></tbody>
            </table>
        </div>
    </section>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script type="module" src="js/contas_pagar.js"></script>
</body>
</html>
