<div id="cardsBancos"></div> <div class="top-actions">
    <select id="filtroStatus">
        <option value="Todos">Todos</option>
        <option value="ABERTO">Aberto</option>
        <option value="PAGO">Pago</option>
    </select>
    <input type="date" id="filtroDataAte">
    
    <button id="btnFiltrar" class="btn-acao">Filtrar</button>
    <button id="btnNovoPagar" class="btn-acao">+ Novo Lançamento</button>
    <button id="btnTransferir" class="btn-acao">Transferências</button>
    <button id="btnGerarPDF" class="btn-acao">Gerar PDF</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Origem da Despesa</th>
                <th>Banco</th>
                <th>Valor</th>
                <th>Vencimento</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="listaPagar"></tbody> </table>
</div>

<div id="modalLancamento" class="modal-financeiro" style="display:none;">
    <div class="modal-content">
        <h2 class="label-futuro">Novo Lançamento</h2>
        <label>Descrição</label>
        <input type="text" id="m_descricao">
        <label>Valor (R$)</label>
        <input type="text" id="m_valor" oninput="validarMoeda(this)">
        <label>Vencimento</label>
        <input type="date" id="m_data">
        <label>Banco</label>
        <select id="m_banco"></select>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="btnSalvarModal" class="btn-acao" style="background: #10b981;">Confirmar</button>
            <button onclick="fecharModal()" class="btn-acao" style="background: #f87171;">Cancelar</button>
        </div>
    </div>
</div>
