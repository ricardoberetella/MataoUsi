<div class="container">
    <div class="resumo-financeiro" id="cardsBancos">
        </div>

    <section class="card">
        <h2 class="card-title">Novo Lançamento / Agendamento</h2>
        <div style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">
            <button id="btnNovoPagar" class="btn-primario" style="background: #10b981;">+ Agendar Conta</button>
            
            <div class="form-group">
                <label>Filtrar Mês</label>
                <input type="month" id="filtroMes" class="input-dark">
            </div>
        </div>
    </section>

    <section class="card">
        <h2 class="card-title">Relatório de Contas por Banco</h2>
        <table class="tabela-futurista">
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Banco Destino</th>
                    <th>Vencimento</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaPagar"></tbody>
        </table>
    </section>
</div>
