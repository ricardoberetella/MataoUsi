<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contas a Pagar - Matão Usinagem</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Estilos específicos para o Modal e Visual Futurista */
        :root {
            --neon-blue: #38bdf8;
            --neon-green: #10b981;
            --neon-red: #f87171;
            --bg-dark: #0f172a;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Grid de Cards de Banco (Saldos) */
        #cardsBancos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card-banco-futuro {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .label-futuro {
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.7rem;
            color: #94a3b8;
            font-family: 'Orbitron', sans-serif;
        }

        .valor-principal {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 5px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        /* Estilo do Modal */
        .modal-financeiro {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; /* Controlado pelo JS */
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--bg-dark);
            border: 2px solid var(--neon-blue);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.2);
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
        }

        .modal-content input:focus {
            border-color: var(--neon-blue);
            outline: none;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        /* Badges de Status Neon */
        .badge-pago { color: var(--neon-green); border: 1px solid var(--neon-green); padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }
        .badge-aberto { color: var(--neon-red); border: 1px solid var(--neon-red); padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }

        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(30, 41, 59, 0.5);
            padding: 15px;
            border-radius: 12px;
        }

        .filtros-area { display: flex; gap: 15px; align-items: center; }
    </style>
</head>
<body>

<header class="topbar">
    <div class="topbar-content">
        <a href="dashboard.html"><button class="btn-voltar">← Voltar</button></a>
        <h1 class="topbar-title">CONTAS A PAGAR</h1>
        <div class="user-info">Matão Usinagem</div>
    </div>
</header>

<div class="container">
    <div id="cardsBancos">
        </div>

    <div class="top-actions">
        <div class="filtros-area">
            <select id="filtroStatus">
                <option value="Todos">Todos os Status</option>
                <option value="ABERTO">Em Aberto</option>
                <option value="PAGO">Pagos</option>
            </select>
            <input type="date" id="filtroDataAte">
            <button id="btnFiltrar" class="btn-acao" style="background: #334155;">Filtrar</button>
        </div>
        <div class="botoes-principais">
            <button id="btnNovoPagar" class="btn-acao" style="background: var(--neon-blue);">+ Novo Lançamento</button>
            <button id="btnTransferir" class="btn-acao" style="background: #6366f1;">Transferências</button>
            <button id="btnGerarPDF" class="btn-acao" style="background: #94a3b8;">Gerar PDF</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Origem da Despesa</th>
                    <th>Banco</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaPagar">
                </tbody>
        </table>
    </div>
</div>

<div id="modalLancamento" class="modal-financeiro">
    <div class="modal-content">
        <h2 class="label-futuro" style="font-size: 1.2rem; margin-bottom: 20px; color: var(--neon-blue);">Nova Saída</h2>
        
        <label class="label-futuro">Origem da Despesa</label>
        <input type="text" id="m_descricao" placeholder="Ex: Pagamento Fornecedor">

        <label class="label-futuro">Valor (R$)</label>
        <input type="text" id="m_valor" placeholder="0,00" oninput="validarMoeda(this)">

        <label class="label-futuro">Vencimento</label>
        <input type="date" id="m_data">

        <label class="label-futuro">Banco para Débito</label>
        <select id="m_banco">
            </select>

        <div style="display: flex; gap: 15px; margin-top: 10px;">
            <button id="btnSalvarModal" class="btn-acao" style="background: var(--neon-green); flex: 1; padding: 15px;">Confirmar</button>
            <button onclick="fecharModal()" class="btn-acao" style="background: var(--neon-red); flex: 1; padding: 15px;">Cancelar</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script type="module" src="js/contas_pagar.js"></script>

</body>
</html>
