<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contas a Pagar - Matão Usinagem</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        /* Estilo do Modal (Janela de Lançamento) */
        .modal-financeiro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: #0f172a; border: 2px solid #38bdf8; padding: 25px; border-radius: 15px; width: 400px;
        }
        .modal-content input, .modal-content select {
            width: 100%; padding: 10px; margin: 10px 0; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 5px;
        }
        .label-futuro { color: #38bdf8; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <a href="dashboard.html"><button class="btn-acao">← Voltar</button></a>
        <h1 style="color: #38bdf8; font-family: 'Orbitron';">CONTAS A PAGAR</h1>
    </header>

    <div id="cardsBancos" style="display: flex; gap: 20px; margin-bottom: 20px;"></div>

    <div style="background: rgba(30, 41, 59, 0.5); padding: 20px; border-radius: 10px; display: flex; gap: 15px; align-items: flex-end;">
        <div>
            <label class="label-futuro">Vencimento até</label><br>
            <input type="date" id="filtroDataAte" style="padding: 8px; border-radius: 5px;">
        </div>
        <button id="btnFiltrar" class="btn-acao">Filtrar</button>
        <button id="btnNovoPagar" class="btn-acao" style="background: #10b981;">+ Novo Lançamento</button>
    </div>

    <table style="width: 100%; margin-top: 20px; border-collapse: collapse;">
        <thead>
            <tr style="border-bottom: 2px solid #38bdf8; color: #38bdf8; text-align: left;">
                <th style="padding: 10px;">Origem</th>
                <th>Banco</th>
                <th>Valor</th>
                <th>Data</th>
                <th>Status</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="listaPagar"></tbody>
    </table>
</div>

<div id="modalLancamento" class="modal-financeiro">
    <div class="modal-content">
        <h2 class="label-futuro" style="margin-bottom: 15px;">Novo Lançamento</h2>
        
        <label class="label-futuro">Descrição</label>
        <input type="text" id="m_descricao" placeholder="Ex: Fornecedor de Alumínio">

        <label class="label-futuro">Valor (R$)</label>
        <input type="text" id="m_valor" placeholder="0,00" oninput="this.value = this.value.replace(/[^0-9,]/g, '')">

        <label class="label-futuro">Vencimento</label>
        <input type="date" id="m_data">

        <label class="label-futuro">Banco</label>
        <select id="m_banco"></select>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="btnSalvarModal" class="btn-acao" style="background: #10b981; flex: 1;">Confirmar</button>
            <button onclick="document.getElementById('modalLancamento').style.display='none'" class="btn-acao" style="background: #f87171; flex: 1;">Cancelar</button>
        </div>
    </div>
</div>

<script type="module" src="js/contas_pagar.js"></script>
</body>
</html>
