<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Matão Usinagem</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
    }

    .login-container {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(56, 189, 248, 0.6);
      border-radius: 12px;
      padding: 30px 25px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.3);
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 20px;
      color: #38bdf8;
    }

    label { display: block; margin-bottom: 5px; }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #1f2937;
      background: #020617;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h1>Acesso ao Sistema</h1>

    <label>E-mail</label>
    <input type="email" id="email" placeholder="seuemail@exemplo.com">

    <label>Senha</label>
    <input type="password" id="senha" placeholder="Digite sua senha">

    <button id="btnLogin">Entrar</button>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://uxtgicfuggpuyjybwawa.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4dGdpY2Z1Z2dwdXlqeWJ3YXdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyNjIyNjIsImV4cCI6MjA3ODgzODI2Mn0.bYAyuTccwk21yWiYrFt_v6mWubDWJGVRWT0rJT74fGg";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById("btnLogin").addEventListener("click", async () => {
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password: senha
      });

      if (error) {
        alert("Erro ao fazer login: " + error.message);
      } else {
        window.location.href = "/dashboard.html";
      }
    });
  </script>

</body>
</html>
