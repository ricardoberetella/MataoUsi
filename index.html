<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MataoUsi</title>

  <!-- Carrega apenas o arquivo login.js -->
  <script type="module" src="js/login.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      background-color: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #38bdf8;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    button:hover {
      background: #0ea5e9;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
      display: block;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">

    <button id="btnLogin">Entrar</button>

    <a href="/recover.html">Esqueci minha senha</a>
  </div>
</body>
</html>
