<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matão USI - Sistema</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f1f3f4;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 26px;
      color: #202124;
      font-weight: 600;
    }

    p {
      color: #5f6368;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      color: white;
      background: #1a73e8;
      box-shadow: 0 2px 6px rgba(26, 115, 232, 0.4);
      transition: 0.25s;
    }

    .btn:hover {
      background: #1663c4;
      box-shadow: 0 3px 8px rgba(26, 115, 232, 0.5);
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #80868b;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Matão USI</h1>
    <p>Sistema de Controle e Gestão</p>

    <a href="login.html" class="btn">Login do Sistema</a>
    <a href="estoque.html" class="btn">Controle de Estoque</a>

    <div class="footer">© 2025 Matão USI</div>
  </div>

</body>
</html>
