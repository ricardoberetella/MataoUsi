<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Matão Usinagem</title>

  <!-- Se você já tiver um login.css, pode usar isso aqui -->
  <!-- <link rel="stylesheet" href="css/login.css"> -->

  <style>
    /* ESTILO SIMPLES SÓ PARA GARANTIR QUE APAREÇA ALGO NA TELA */
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
    }

    .login-container {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(56, 189, 248, 0.6);
      border-radius: 12px;
      padding: 30px 25px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.3);
    }

    .login-container h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
      color: #38bdf8;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: #6b7280;
    }

    #btnLogin {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    #btnLogin:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.7);
    }

    .logo {
      text-align: center;
      margin-bottom: 10px;
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo">MATÃO USINAGEM</div>
    <h1>Acesso ao Sistema</h1>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seuemail@exemplo.com">
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha">
    </div>

    <button id="btnLogin">Entrar</button>
  </div>

  <!-- SCRIPT DO LOGIN COM SUPABASE -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./js/config.js";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.addEventListener("DOMContentLoaded", () => {
      const btn = document.getElementById("btnLogin");

      btn.addEventListener("click", async () => {
        const email = document.getElementById("email").value;
        const senha = document.getElementById("senha").value;

        const { error } = await supabase.auth.signInWithPassword({
          email,
          password: senha
        });

        if (error) {
          alert("Erro ao fazer login: " + error.message);
        } else {
          window.location.href = "/dashboard.html";
        }
      });
    });
  </script>

</body>
</html>
