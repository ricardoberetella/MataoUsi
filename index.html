<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carregando...</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0f172a; /* cor do painel */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loader {
      color: #38bdf8;
      font-size: 22px;
      font-family: Arial, sans-serif;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: .2; }
      50% { opacity: 1; }
      100% { opacity: .2; }
    }
  </style>
</head>

<body>
  <div class="loader">Carregando...</div>

  <script>
    // redirecionamento rápido e suave
    window.location.replace("painel.html");
  </script>
</body>
</html>
