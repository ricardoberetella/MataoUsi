<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Saldo Líquido - Matão Usinagem</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
<header class="topbar">
    <a href="dashboard.html"><button class="btn-voltar">⬅ Voltar ao Menu</button></a>
    <h1 class="topbar-title">Fluxo de Caixa / Saldo Líquido</h1>
</header>

<div class="container">
    <div class="grid-resumo">
        <div class="card-valor">
            <h3 style="color: #94a3b8">Previsão de Recebimento</h3>
            <p id="totalReceber" class="v-positivo">R$ 0,00</p>
            <small>Status: ABERTO</small>
        </div>
        <div class="card-valor">
            <h3 style="color: #94a3b8">Contas a Pagar</h3>
            <p id="totalPagar" class="v-negativo">R$ 0,00</p>
            <small>Status: ABERTO</small>
        </div>
    </div>

    <div class="grid-resumo" id="gridBancos" style="margin-top: 20px;"></div>

    <div class="card-valor" style="margin-top: 20px; border: 1px solid #38bdf8; background: rgba(56,189,248,0.05);">
        <h3 style="color: #38bdf8">Saldo Líquido Projetado (Disponível após quitar tudo)</h3>
        <p id="saldoLiquido" class="v-liquido" style="font-size: 2.8rem;">R$ 0,00</p>
    </div>
</div>

<script type="module">
    import { supabase, verificarLogin } from "./js/auth.js";

    document.addEventListener("DOMContentLoaded", async () => {
        await verificarLogin();
        
        const { data: bancos } = await supabase.from("bancos").select("*").order("nome");
        const { data: rec } = await supabase.from("contas_receber").select("valor").eq("status", "ABERTO");
        const { data: pag } = await supabase.from("contas_pagar").select("valor").eq("status", "ABERTO");

        const totalBancos = bancos ? bancos.reduce((acc, b) => acc + parseFloat(b.saldo), 0) : 0;
        const totalRec = rec ? rec.reduce((acc, r) => acc + parseFloat(r.valor), 0) : 0;
        const totalPag = pag ? pag.reduce((acc, p) => acc + parseFloat(p.valor), 0) : 0;
        
        const liquido = (totalBancos + totalRec) - totalPag;

        document.getElementById("gridBancos").innerHTML = bancos.map(b => `
            <div class="card-valor" style="border-color: #1e293b; background: #0f172a;">
                <h4 style="color: #94a3b8">${b.nome} (Saldo Atual)</h4>
                <p style="font-size: 1.6rem; font-weight: bold; color: #fff;">${parseFloat(b.saldo).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</p>
            </div>
        `).join('');

        const config = { style: 'currency', currency: 'BRL' };
        document.getElementById("totalReceber").innerText = totalRec.toLocaleString('pt-BR', config);
        document.getElementById("totalPagar").innerText = totalPag.toLocaleString('pt-BR', config);
        document.getElementById("saldoLiquido").innerText = liquido.toLocaleString('pt-BR', config);
    });
</script>
</body>
</html>
