<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Fluxo de Caixa / Saldo Líquido - Matão Usinagem</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        /* Estilos baseados nos seus cards de resumo */
        .v-banco { color: #38bdf8; font-size: 2rem; font-weight: bold; margin: 10px 0; }
        .grid-bancos { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-top: 20px; 
        }
        .card-banco-resumo {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
<header class="topbar">
    <a href="dashboard.html"><button class="btn-voltar">← Voltar ao Menu</button></a>
    <h1 class="topbar-title">Fluxo de Caixa / Saldo Líquido</h1>
</header>

<div class="container">
    <div class="grid-resumo">
        <div class="card-valor">
            <h3>Previsão de Recebimento</h3>
            <p id="totalReceber" class="v-positivo">R$ 0,00</p>
            <small>Status: ABERTO</small>
        </div>
        <div class="card-valor">
            <h3>Contas a Pagar</h3>
            <p id="totalPagar" class="v-negativo">R$ 0,00</p>
            <small>Status: ABERTO</small>
        </div>
    </div>

    <div class="grid-bancos">
        <div class="card-banco-resumo">
            <h3 style="color: #94a3b8; text-transform: uppercase; font-size: 0.9rem;">Saldo Atual SICOOB</h3>
            <p id="saldoSicoob" class="v-banco">R$ 0,00</p>
        </div>
        <div class="card-banco-resumo">
            <h3 style="color: #94a3b8; text-transform: uppercase; font-size: 0.9rem;">Saldo Atual CAIXA FEDERAL</h3>
            <p id="saldoCaixa" class="v-banco">R$ 0,00</p>
        </div>
    </div>

    <div class="card-valor" style="margin-top: 20px; border: 1px solid #38bdf8; background: rgba(56,189,248,0.05);">
        <h3>Saldo Líquido Projetado (Disponível após pagar tudo)</h3>
        <p id="saldoLiquido" class="v-liquido" style="font-size: 3rem;">R$ 0,00</p>
    </div>
</div>

<script type="module">
    import { supabase, verificarLogin } from "./js/auth.js";

    document.addEventListener("DOMContentLoaded", async () => {
        await verificarLogin();
        atualizarResumoFinanceiro();
    });

    async function atualizarResumoFinanceiro() {
        // 1. Buscar Saldos dos Bancos
        const { data: bancos } = await supabase.from("bancos").select("*");
        
        let sicoobVal = 0;
        let caixaVal = 0;

        if (bancos) {
            bancos.forEach(b => {
                if (b.nome === 'SICOOB') sicoobVal = parseFloat(b.saldo);
                if (b.nome === 'CAIXA FEDERAL') caixaVal = parseFloat(b.saldo);
            });
        }

        const totalEmBancos = sicoobVal + caixaVal;

        // 2. Buscar Previsões (Receber e Pagar)
        const { data: rec } = await supabase.from("contas_receber").select("valor").eq("status", "ABERTO");
        const { data: pag } = await supabase.from("contas_pagar").select("valor").eq("status", "ABERTO");

        const totalRec = rec ? rec.reduce((acc, i) => acc + parseFloat(i.valor), 0) : 0;
        const totalPag = pag ? pag.reduce((acc, i) => acc + parseFloat(i.valor), 0) : 0;
        
        // Cálculo: (Dinheiro real em bancos + Previsão de entrada) - Previsão de saída
        const liquidoProjetado = (totalEmBancos + totalRec) - totalPag;

        // 3. Renderizar na tela
        const fmt = { style: 'currency', currency: 'BRL' };
        document.getElementById("saldoSicoob").innerText = sicoobVal.toLocaleString('pt-BR', fmt);
        document.getElementById("saldoCaixa").innerText = caixaVal.toLocaleString('pt-BR', fmt);
        
        document.getElementById("totalReceber").innerText = totalRec.toLocaleString('pt-BR', fmt);
        document.getElementById("totalPagar").innerText = totalPag.toLocaleString('pt-BR', fmt);
        document.getElementById("saldoLiquido").innerText = liquidoProjetado.toLocaleString('pt-BR', fmt);
    }
</script>
</body>
</html>
