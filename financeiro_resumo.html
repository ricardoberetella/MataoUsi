<div class="grid-resumo">
    <div class="card-valor">
        <h3>Previsão de Recebimento</h3>
        <p id="totalReceber" class="v-positivo">R$ 0,00</p>
        <small>Status: ABERTO</small>
    </div>
    <div class="card-valor">
        <h3>Contas a Pagar</h3>
        <p id="totalPagar" class="v-negativo">R$ 0,00</p>
        <small>Status: ABERTO</small>
    </div>
</div>

<div class="grid-resumo" id="gridBancos" style="margin-top: 20px;"></div>

<div class="card-valor" style="margin-top: 20px; border: 1px solid #38bdf8; background: rgba(56,189,248,0.05);">
    <h3>Saldo Líquido Projetado (Disponível após quitar tudo)</h3>
    <p id="saldoLiquido" class="v-liquido">R$ 0,00</p>
</div>

<script type="module">
    import { supabase, verificarLogin } from "./js/auth.js";

    document.addEventListener("DOMContentLoaded", async () => {
        await verificarLogin();
        
        const { data: bancos } = await supabase.from("bancos").select("*");
        const { data: rec } = await supabase.from("contas_receber").select("valor").eq("status", "ABERTO");
        const { data: pag } = await supabase.from("contas_pagar").select("valor").eq("status", "ABERTO");

        const totalBancos = bancos.reduce((acc, b) => acc + parseFloat(b.saldo), 0);
        const totalRec = rec.reduce((acc, r) => acc + parseFloat(r.valor), 0);
        const totalPag = pag.reduce((acc, p) => acc + parseFloat(p.valor), 0);
        
        const liquido = (totalBancos + totalRec) - totalPag;

        document.getElementById("gridBancos").innerHTML = bancos.map(b => `
            <div class="card-valor" style="border-color: #1e293b;">
                <h4 style="color: #94a3b8">${b.nome}</h4>
                <p style="font-size: 1.4rem; font-weight: bold; color: #fff;">${parseFloat(b.saldo).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</p>
            </div>
        `).join('');

        document.getElementById("totalReceber").innerText = totalRec.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById("totalPagar").innerText = totalPag.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById("saldoLiquido").innerText = liquido.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    });
</script>
