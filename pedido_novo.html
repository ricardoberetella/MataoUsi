<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Pedido - MataoUsi</title>
  <link rel="stylesheet" href="css/pedidos.css">
</head>
<body>
  <!-- Topbar -->
  <header class="topbar">
    <div class="logo-area">
      <div class="logo-circle">MU</div>
      <div class="logo-text">
        <span class="app-name">Matao Usinagem</span>
        <span class="app-subtitle">Cadastro de Pedido</span>
      </div>
    </div>
    <button class="btn btn-ghost" type="button" onclick="window.location.href='pedidos.html'">
      Voltar à Lista
    </button>
  </header>

  <main class="page">
    <section class="card">
      <div class="card-header">
        <div>
          <h1 id="tituloPagina">Novo Pedido</h1>
          <p>Preencha os dados do cabeçalho e inclua os itens do pedido.</p>
        </div>
      </div>

      <!-- CABEÇALHO DO PEDIDO -->
      <form id="formPedido" class="grid-header">
        <div class="field">
          <label for="cliente">Cliente</label>
          <select id="cliente" required>
            <option value="">Selecione...</option>
          </select>
        </div>

        <div class="field">
          <label for="data_pedido">Data do Pedido</label>
          <input type="date" id="data_pedido" required>
        </div>

        <div class="field">
          <label for="pc_oc">PC / OC</label>
          <input type="text" id="pc_oc" placeholder="Ex: PC-123 ou OC-456">
        </div>

        <div class="field">
          <label for="numero_pedido">Número do Pedido</label>
          <input type="text" id="numero_pedido" required placeholder="Ex: P-0001">
        </div>

        <div class="field">
          <label for="tipo_pedido">Tipo de Pedido</label>
          <select id="tipo_pedido" required>
            <option value="">Selecione...</option>
            <option value="VENDA">Venda</option>
            <option value="ORCAMENTO">Orçamento</option>
            <option value="SERVICO">Serviço</option>
          </select>
        </div>

        <div class="field field-full">
          <label for="observacoes">Observações</label>
          <textarea id="observacoes" rows="3" placeholder="Informações adicionais..."></textarea>
        </div>
      </form>

      <!-- ITENS DO PEDIDO -->
      <section class="itens-section">
        <h2>Itens do Pedido</h2>
        <div class="itens-adicionar">
          <div class="field">
            <label for="codigo_produto">Código do Produto</label>
            <input type="text" id="codigo_produto" placeholder="Ex: 1020">
          </div>

          <div class="field">
            <label for="descricao_produto">Descrição</label>
            <input type="text" id="descricao_produto" disabled placeholder="Descrição do produto">
          </div>

          <div class="field">
            <label for="preco_unitario">Preço Unitário (R$)</label>
            <input type="text" id="preco_unitario" placeholder="0,00">
          </div>

          <div class="field">
            <label for="quantidade">Quantidade</label>
            <input type="number" id="quantidade" placeholder="0" min="0" step="0.01">
          </div>

          <div class="field field-small">
            <label>&nbsp;</label>
            <button id="btnBuscarProduto" class="btn btn-secondary" type="button">
              Buscar
            </button>
          </div>

          <div class="field field-small">
            <label>&nbsp;</label>
            <button id="btnAdicionarItem" class="btn btn-primary" type="button">
              + Adicionar
            </button>
          </div>
        </div>

        <div class="table-wrapper">
          <table class="tabela">
            <thead>
              <tr>
                <th>Código</th>
                <th>Descrição</th>
                <th>Qtd</th>
                <th>Unitário (R$)</th>
                <th>Total (R$)</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tbodyItens">
              <!-- Itens via JS -->
            </tbody>
          </table>
        </div>

        <div class="totais">
          <span>Total do Pedido:</span>
          <strong id="totalPedido">R$ 0,00</strong>
        </div>
      </section>

      <!-- BOTÕES FINAIS -->
      <div class="form-actions">
        <button id="btnSalvarPedido" class="btn btn-primary" type="button">
          Salvar Pedido
        </button>
        <button id="btnCancelar" class="btn btn-ghost" type="button" onclick="window.location.href='pedidos.html'">
          Cancelar
        </button>
      </div>
    </section>
  </main>

  <script type="module" src="pedido_novo.js"></script>
</body>
</html>
