<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novo Pedido - MataoUsi</title>

  <!-- CSS futurista compartilhado com pedidos -->
  <link rel="stylesheet" href="CSS/pedidos.css" />
</head>

<body>
  <!-- TOPO -->
  <header class="topbar">
    <div class="user-area">
      <div class="logo-circle">MU</div>
      <div class="logo-text">
        <span class="app-name">Matao Usinagem</span>
        <span class="app-subtitle">Cadastro de Pedido</span>
      </div>
    </div>

    <button class="btn btn-ghost" onclick="window.location.href='pedidos.html'">
      Voltar à Lista
    </button>
  </header>

  <main class="page">
    <section class="card">
      <div class="card-header">
        <div>
          <h1>Novo Pedido</h1>
          <p class="texto-menor">Preencha os dados do pedido e adicione os itens.</p>
        </div>
      </div>

      <!-- CABEÇALHO DO PEDIDO -->
      <section class="filtros">
        <div class="field">
          <label>CLIENTE</label>
          <select id="cliente_id">
            <option value="">Selecione...</option>
          </select>
        </div>

        <div class="field">
          <label>DATA PEDIDO</label>
          <input id="data_pedido" type="date" />
        </div>

        <div class="field">
          <label>TIPO DOCUMENTO</label>
          <select id="tipo_documento">
            <option value="PC">PC - Pedido de Compra</option>
            <option value="OC">OC - Ordem de Compra</option>
          </select>
        </div>

        <div class="field">
          <label>Nº DOCUMENTO</label>
          <input id="numero_documento" placeholder="Ex: 345.980" />
        </div>
      </section>

      <!-- ITENS DO PEDIDO -->
      <h2>Itens do Pedido</h2>

      <div class="itens-section">

        <!-- Linha de inclusão de item -->
        <div class="itens-adicionar">
          <div class="field">
            <label>CÓDIGO</label>
            <input id="item_codigo" placeholder="Clique para selecionar" readonly />
          </div>

          <div class="field">
            <label>DESCRIÇÃO</label>
            <input id="item_descricao" readonly />
          </div>

          <div class="field">
            <label>PREÇO R$</label>
            <input id="item_preco" placeholder="0,00" />
          </div>

          <div class="field">
            <label>QTD</label>
            <input id="item_qtd" type="number" min="0" step="1" />
          </div>

          <div class="field">
            <label>DATA ENTREGA</label>
            <input id="item_data_entrega" type="date" />
          </div>

          <div class="field">
            <label>&nbsp;</label>
            <button id="btnBuscarProduto" class="btn btn-secondary">Buscar</button>
          </div>

          <div class="field">
            <label>&nbsp;</label>
            <button id="btnAddItem" class="btn btn-primary">+</button>
          </div>
        </div>

        <!-- Tabela de itens -->
        <div class="table-wrapper">
          <table class="tabela">
            <thead>
              <tr>
                <th>CÓDIGO</th>
                <th>DESCRIÇÃO</th>
                <th>QTD</th>
                <th>UNIT</th>
                <th>DATA ENTREGA</th>
                <th>TOTAL</th>
                <th>STATUS</th>
                <th>AÇÕES</th>
              </tr>
            </thead>
            <tbody id="tabelaItens"></tbody>
          </table>
        </div>

        <div class="total-area" style="margin-top: 10px; text-align: right;">
          <span>Total:</span>
          <strong id="totalPedido">R$ 0,00</strong>
        </div>
      </div>

      <p id="msgErro" class="msg-erro"></p>

      <div class="form-actions">
        <button id="btnSalvarPedido" class="btn btn-primary">Salvar</button>
        <button class="btn btn-secondary" onclick="window.location.href='pedidos.html'">
          Cancelar
        </button>
      </div>

    </section>
  </main>

  <!-- MODAL DE PRODUTOS -->
  <div class="modal-overlay" id="modalProdutos">
    <div class="modal">
      <div class="modal-header">
        <h3>Selecionar Produto</h3>
        <button class="btn btn-ghost" id="btnFecharModal">X</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Buscar</label>
          <input id="buscaProduto" placeholder="Código ou descrição" />
        </div>
        <div class="table-wrapper">
          <table class="tabela">
            <thead>
              <tr>
                <th>CÓDIGO</th>
                <th>DESCRIÇÃO</th>
                <th>UNIT</th>
                <th>AÇÃO</th>
              </tr>
            </thead>
            <tbody id="listaProdutosModal"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script type="module" src="js/pedido_novo.js"></script>
</body>
</html>
