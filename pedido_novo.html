<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Pedido - MataoUsi</title>
  <link rel="stylesheet" href="css/pedidos.css">
</head>

<body>

  <header class="topbar">
    <div class="logo-area">
      <div class="logo-circle">MU</div>
      <div class="logo-text">
        <span class="app-name">Matao Usinagem</span>
        <span class="app-subtitle">Cadastro de Pedido</span>
      </div>
    </div>

    <button class="btn btn-ghost" onclick="window.location.href='pedidos.html'">
      Voltar à Lista
    </button>
  </header>

  <main class="page">
    <section class="card">

      <div class="card-header">
        <h1 id="tituloPagina">Novo Pedido</h1>
      </div>

      <!-- CABEÇALHO -->
      <form class="grid-header" id="formPedido">

        <div class="field">
          <label>Cliente</label>
          <select id="cliente" required>
            <option value="">Selecione...</option>
          </select>
        </div>

        <div class="field">
          <label>Data Pedido</label>
          <input type="date" id="data_pedido" required>
        </div>

        <div class="field">
          <label>Tipo</label>
          <select id="tipo_documento" required>
            <option value="">Selecione...</option>
            <option value="PC">Pedido de Compra (PC)</option>
            <option value="OC">Ordem de Compra (OC)</option>
          </select>
        </div>

        <div class="field">
          <label>Número do Documento</label>
          <input type="text" id="numero_documento" placeholder="Ex: PC-345.980" required>
        </div>

      </form>

      <!-- ITENS -->
      <section class="itens-section">

        <h2>Itens do Pedido</h2>

        <div class="itens-adicionar">

          <div class="field">
            <label>Código</label>
            <input id="codigo_produto" placeholder="Ex: 1020">
          </div>

          <div class="field">
            <label>Descrição</label>
            <input id="descricao_produto" disabled>
          </div>

          <div class="field">
            <label>Preço R$</label>
            <input id="preco_unitario" placeholder="0,00">
          </div>

          <div class="field">
            <label>Qtd</label>
            <input id="quantidade" type="number" step="0.01">
          </div>

          <button class="btn btn-secondary" id="btnBuscarProduto" type="button">Buscar</button>
          <button class="btn btn-primary" id="btnAdicionarItem" type="button">+</button>

        </div>

        <div class="table-wrapper">
          <table class="tabela">
            <thead>
              <tr>
                <th>Código</th>
                <th>Descrição</th>
                <th>Qtd</th>
                <th>Unit</th>
                <th>Total</th>
                <th>Ações</th>
              </tr>
            </thead>

            <tbody id="tbodyItens"></tbody>

          </table>
        </div>

        <div class="totais">
          <span>Total:</span>
          <strong id="totalPedido">R$ 0,00</strong>
        </div>

      </section>

      <div class="form-actions">
        <button class="btn btn-primary" id="btnSalvarPedido" type="button">Salvar</button>
        <button class="btn btn-ghost" type="button" onclick="window.location.href='pedidos.html'">
          Cancelar
        </button>
      </div>

    </section>
  </main>

  <script type="module" src="js/pedido_novo.js"></script>
</body>
</html>
