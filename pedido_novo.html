<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novo Pedido - MataoUsi</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/pedidos.css" />
</head>

<body>

  <!-- TOPO -->
  <header class="topbar">
    <div class="user-area">
      <div class="logo-circle">MU</div>
      <div class="logo-text">
        <span class="app-name">Matao Usinagem</span>
        <span class="app-subtitle">Cadastro de Pedido</span>
      </div>
    </div>

    <button class="btn btn-ghost" onclick="window.location.href='pedidos.html'">
      Voltar à Lista
    </button>
  </header>

  <!-- PÁGINA -->
  <main class="page">
    <section class="card">

      <h1>Novo Pedido</h1>

      <!-- CABEÇALHO SIMPLIFICADO -->
      <form id="formPedido" class="grid-header">

        <!-- Cliente -->
        <div class="field">
          <label>Cliente</label>
          <select id="cliente" required>
            <option value="">Selecione...</option>
          </select>
        </div>

        <!-- Data -->
        <div class="field">
          <label>Data</label>
          <input type="date" id="data_pedido" required />
        </div>

        <!-- Tipo Documento (PC / OC) -->
        <div class="field">
          <label>Tipo de Documento</label>
          <select id="tipo_documento" required>
            <option value="">Selecione...</option>
            <option value="PC">PC - Pedido de Compra</option>
            <option value="OC">OC - Ordem de Compra</option>
          </select>
        </div>

        <!-- Número Documento -->
        <div class="field">
          <label>Nº Documento</label>
          <input type="text" id="numero_documento" placeholder="Ex: PC-123" required />
        </div>
      </form>

      <!-- ITENS DO PEDIDO -->
      <section class="itens-section">

        <h2>Itens do Pedido</h2>

        <!-- Linha de inclusão -->
        <div class="itens-adicionar">

          <div class="field">
            <label>Código</label>
            <input id="codigo_produto" placeholder="Clique para selecionar" readonly />
          </div>

          <div class="field">
            <label>Descrição</label>
            <input id="descricao_produto" disabled />
          </div>

          <div class="field">
            <label>Preço R$</label>
            <input id="preco_unitario" />
          </div>

          <div class="field">
            <label>Qtd</label>
            <input id="quantidade" type="number" step="0.01" />
          </div>

          <button class="btn btn-secondary" type="button" id="btnBuscarProduto">Buscar</button>
          <button class="btn btn-primary" type="button" id="btnAdicionarItem">+</button>

        </div>

        <!-- Tabela de itens -->
        <div class="table-wrapper">
          <table class="tabela">
            <thead>
              <tr>
                <th>Código</th>
                <th>Descrição</th>
                <th>Qtd</th>
                <th>Unit</th>
                <th>Total</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tbodyItens"></tbody>
          </table>
        </div>

        <!-- Total do pedido -->
        <div class="totais">
          <span>Total:</span>
          <strong id="totalPedido">R$ 0,00</strong>
        </div>
      </section>

      <!-- BOTÕES -->
      <div class="form-actions">
        <button class="btn btn-primary" type="button" id="btnSalvarPedido">Salvar</button>
        <button class="btn btn-ghost" type="button" onclick="window.location.href='pedidos.html'">Cancelar</button>
      </div>

    </section>
  </main>

  <!-- MODAL DE PRODUTOS -->
  <div id="modalProdutos" class="modal-overlay">
    <div class="modal">

      <div class="modal-header">
        <h2>Selecionar Produto</h2>
        <button type="button" class="btn btn-ghost btn-fechar-modal">&times;</button>
      </div>

      <div class="modal-body">
        <div class="field">
          <label>Buscar</label>
          <input id="buscaProduto" placeholder="Código ou descrição" />
        </div>

        <div class="table-wrapper modal-table-wrapper">
          <table class="tabela">
            <thead>
              <tr>
                <th>Código</th>
                <th>Descrição</th>
                <th>Preço</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tbodyModalProdutos"></tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

  <!-- JS -->
  <script type="module" src="js/pedido_novo.js"></script>

</body>

</html>
